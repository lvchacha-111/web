<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D 产品展示 - 亿角云端版</title>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        /* 基础布局 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #393939; font-family: sans-serif; color: white; }
        body { display: flex; flex-direction: row; }
        
        /* 侧边栏定制：加宽一点以容纳更多色块 */
        #sidebar { width: 340px; min-width: 340px; height: 100vh; background: #2c2c2c; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 20; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; box-sizing: border-box; }
        #canvas-container { flex: 1; height: 100%; position: relative; background-color: #393939; min-width: 0; }
        
        .header-box { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .header-box h1 { font-size: 18px; color: #f39c12; margin: 0; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 12px; padding: 4px 8px; background: #3d3d3d; border-radius: 3px; border: 1px solid #555;}
        
        /* 统一标题和网格容器 */
        .section-title { display: block; margin-bottom: 8px; font-size: 13px; color: #f39c12; font-weight: bold; margin-top: 5px; border-left: 3px solid #f39c12; padding-left: 6px;}
        .sub-title { font-size: 11px; color: #888; margin-bottom: 5px; margin-top: 5px; }
       /* 修改为固定大小、自动换行的精致布局 */
.option-grid { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 12px; 
    padding: 4px 0;
}

/* 统一的固定大小方形色块样式 */
.square-btn { 
    width: 38px;         /* 固定宽度，不再随侧边栏拉伸 */
    height: 38px;        /* 固定高度 */
    border-radius: 6px;  /* 稍微增加圆角使其更柔和 */
    border: 2px solid #4d4d4d; 
    cursor: pointer; 
    transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
    background-size: cover; 
    background-position: center; 
    box-shadow: inset 0 0 4px rgba(0,0,0,0.4); 
    box-sizing: border-box;
    position: relative;
}

.square-btn:hover { 
    border-color: #aaa; 
    transform: translateY(-3px); 
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
}

/* 激活状态：采用稍微明显的放大效果和主题色光晕 */
.square-btn.active { 
    border-color: #f39c12; /* 使用你原本的主题橘黄色作为边框 */
    transform: scale(1.15); 
    z-index: 2;
    box-shadow: 0 0 10px rgba(243, 156, 18, 0.6);
}
        /* 其他控件 */
        .custom-picker-container { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 11px; color: #888; }
        input[type="color"] { width: 40px; height: 30px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; border-radius: 3px; }
        input[type=range] { width: 100%; padding: 8px; background: #3d3d3d; border: 1px solid #555; color: white; border-radius: 3px; outline: none; margin-top: 5px; }
        .action-btn { width: 100%; padding: 12px; background: #f39c12; border: none; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; transition: 0.2s; font-size: 14px; }
        .action-btn:hover { background: #fff; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; background: rgba(30,30,30,0.9); padding: 20px 40px; border-radius: 10px; border: 1px solid #555; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f39c12; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header-box">
        <h1 id="pageTitle">工业配置台</h1>
        <a href="index.html" class="back-btn">← 返回</a>
    </div>

    <!-- === 1. 背板材质 === -->
    <div>
        <label class="section-title">背板材质 (Back Material)</label>
        
        <div class="sub-title">拉丝系列 (Brushed)</div>
        <div class="option-grid" id="materialBrushed">
            <div class="square-btn active" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg');" data-type="brushed" data-color="#ffffff" title="银色金属"></div>
            <div class="square-btn" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #b87333; background-blend-mode: multiply;" data-type="brushed" data-color="#b87333" title="红铜"></div>
            <div class="square-btn" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #b76e79; background-blend-mode: multiply;" data-type="brushed" data-color="#b76e79" title="玫瑰金"></div>
            <div class="square-btn" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #d4af37; background-blend-mode: multiply;" data-type="brushed" data-color="#d4af37" title="金色"></div>
            <div class="square-btn" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #222222; background-blend-mode: multiply;" data-type="brushed" data-color="#222222" title="黑色"></div>
            <div class="square-btn" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #5c4033; background-blend-mode: multiply;" data-type="brushed" data-color="#5c4033" title="棕色"></div>
        </div>

        <div class="sub-title">镜面系列 (Mirror)</div>
        <div class="option-grid" id="materialMirror">
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg');" data-type="mirror" data-color="#ffffff" title="银色金属"></div>
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #b87333; background-blend-mode: multiply;" data-type="mirror" data-color="#b87333" title="红铜"></div>
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #b76e79; background-blend-mode: multiply;" data-type="mirror" data-color="#b76e79" title="玫瑰金"></div>
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #d4af37; background-blend-mode: multiply;" data-type="mirror" data-color="#d4af37" title="金色"></div>
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #222222; background-blend-mode: multiply;" data-type="mirror" data-color="#222222" title="黑色"></div>
            <div class="square-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #5c4033; background-blend-mode: multiply;" data-type="mirror" data-color="#5c4033" title="棕色"></div>
        </div>
    </div>

    <!-- === 2. 面壳漆色 === -->
    <div>
        <label class="section-title">面壳漆色 (Front Paint)</label>
        <div class="option-grid" id="frontColorSwatches">
            <div class="square-btn" style="background-color: #ff7f00;" data-color="#ff7f00" title="橘色"></div>
            <div class="square-btn" style="background-color: #ffdf00;" data-color="#ffdf00" title="黄色"></div>
            <div class="square-btn" style="background-color: #ff66cc;" data-color="#ff66cc" title="粉色"></div>
            <div class="square-btn" style="background-color: #0088ff;" data-color="#0088ff" title="蓝色"></div>
            <div class="square-btn" style="background-color: #00cc44;" data-color="#00cc44" title="绿色"></div>
            <div class="square-btn" style="background-color: #ff0000;" data-color="#ff0000" title="红色"></div>
            <div class="square-btn active" style="background-color: #ffffff;" data-color="#ffffff" title="标准白"></div>
            <div class="square-btn" style="background-color: #fffdd0;" data-color="#fffdd0" title="暖白"></div>
        </div>
        <div class="custom-picker-container">
            <input type="color" id="frontColorPicker" value="#ffffff">
            <span>自定义面壳色</span>
        </div>
    </div>

    <!-- === 3. LED 灯光颜色 === -->
    <div>
        <label class="section-title">灯光颜色 (LED Color)</label>
        <div class="option-grid" id="ledColorSwatches">
            <div class="square-btn" style="background-color: #ff8c00;" data-color="#ff8c00" title="橘色"></div>
            <div class="square-btn" style="background-color: #ffee00;" data-color="#ffee00" title="黄色"></div>
            <div class="square-btn" style="background-color: #ff1493;" data-color="#ff1493" title="粉色"></div>
            <div class="square-btn" style="background-color: #00bfff;" data-color="#00bfff" title="蓝色"></div>
            <div class="square-btn" style="background-color: #32cd32;" data-color="#32cd32" title="绿色"></div>
            <div class="square-btn" style="background-color: #ff0000;" data-color="#ff0000" title="红色"></div>
            <div class="square-btn active" style="background-color: #ffffff;" data-color="#ffffff" title="标准白"></div>
            <div class="square-btn" style="background-color: #fffae6;" data-color="#fffae6" title="暖白"></div>
            <div class="square-btn" style="background-color: #e6f2ff;" data-color="#e6f2ff" title="冷白"></div>
        </div>
        <div class="custom-picker-container">
            <input type="color" id="ledColorPicker" value="#ffffff">
            <span>自定义灯光色</span>
        </div>
        
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#888; margin-top:10px;">
            <span>灯光亮度调节</span>
            <span id="brightnessValue">15%</span>
        </div>
        <input type="range" id="brightnessSlider" min="0" max="100" step="1" value="15">
    </div>

    <button class="action-btn" id="decomposeBtn">一键解体检查内部</button>
</div>

<div id="canvas-container">
    <div id="loading"><div class="spinner"></div><span>正从云端加载 3D 资产...</span></div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const supabaseClient = supabase.createClient('https://hfiwagyothcdhlcfivsu.supabase.co', 'sb_publishable_6tnK0XbTCTGw5pSmnK3o-A_2a7TlS0O');

    // 全局变量定义（修复 container 跨作用域报错的问题）
    let container, scene, camera, renderer, controls, modelGroup, bloomComposer, finalComposer;
    let sceneMeshes = [], backMeshes = [], ledMeshes = [], plateMeshes = [];
    let isDecomposed = false;
    
    const bloomLayer = new THREE.Layers(); bloomLayer.set(1);
    const darkMaterial = new THREE.MeshBasicMaterial({ color: 'black' });
    const blackBgColor = new THREE.Color(0x000000); // 提前声明，防止内存泄漏
    const materials = {};
    const textureLoader = new THREE.TextureLoader();

    // 1. 初始化
    async function init() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id') || 'YJ-M000B';
            document.getElementById('pageTitle').innerText = productId;

            const { data, error } = await supabaseClient.from('model_details').select('config').eq('id', productId).single();
            if (error || !data) throw new Error("ID 未找到");

            setupBaseScene();
            loadModels(data.config, productId);
            animate();
        } catch (err) {
            document.getElementById('loading').innerHTML = "<span>❌ 加载失败，请检查配置</span>";
        }
    }

    // 2. 场景与辉光
    function setupBaseScene() {
        container = document.getElementById('canvas-container'); // 赋予全局变量
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#393939');
        scene.fog = new THREE.Fog('#393939', 100, 1000);
        modelGroup = new THREE.Group(); scene.add(modelGroup);

        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 0.8;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement); 
        controls.enableDamping = true;

        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.25, 1, 0);
        bloomComposer = new EffectComposer(renderer); 
        bloomComposer.renderToScreen = false;
        bloomComposer.addPass(renderPass); 
        bloomComposer.addPass(bloomPass);

        const mixPass = new ShaderPass(new THREE.ShaderMaterial({
            uniforms: { baseTexture: { value: null }, tBloom: { value: bloomComposer.renderTarget2.texture } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`,
            fragmentShader: `uniform sampler2D baseTexture; uniform sampler2D tBloom; varying vec2 vUv; void main() { gl_FragColor = ( texture2D( baseTexture, vUv ) + vec4( 1.0 ) * texture2D( tBloom, vUv ) ); }`,
        }), "baseTexture");
        
        finalComposer = new EffectComposer(renderer);
        finalComposer.addPass(renderPass); 
        finalComposer.addPass(mixPass); 
        finalComposer.addPass(new OutputPass());

        new RGBELoader().setPath('textures/').load('monochrome_studio_02_2k (1).hdr', (t) => { t.mapping = THREE.EquirectangularReflectionMapping; scene.environment = t; });
        scene.add(new THREE.GridHelper(4000, 400, '#464646', '#464646'));
    }

    // 3. 模型加载
    function loadModels(config, productId) {
        const folderPath = `stl/${productId}/`;
        let loadedCount = 0;
        const loaderSTL = new STLLoader(); 
        const loaderGLB = new GLTFLoader();

        config.forEach(part => {
            const filePath = folderPath + part.file;
            const isGLB = filePath.toLowerCase().endsWith('.glb');
            const setupObject = (object, isSTL = false) => {
                loadedCount++;
                object.traverse((child) => {
                    if (child.isMesh) {
                        const col = child.material.color ? child.material.color.clone() : new THREE.Color(0xffffff);
                        if (part.type === 'back') {
                            child.material = createMetalMaterial('Metal011', true, 0xffffff);
                            backMeshes.push(child);
                        } else if (part.type === 'led' || part.type === 'plate') {
                            child.material = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0, toneMapped: false });
                            child.layers.enable(1);
                            if(part.type === 'led') ledMeshes.push(child); else plateMeshes.push(child);
                        } else if (part.type === 'front') {
                            child.material = new THREE.MeshStandardMaterial({ color: col, roughness: 1, metalness: 0 });
                            sceneMeshes.push(child);
                        }
                        if (isSTL) child.rotation.x = -Math.PI / 2;
                    }
                });
                object.userData = { move: part.move, type: part.type };
                modelGroup.add(object);
                if (loadedCount === config.length) { 
                    document.getElementById('loading').style.display='none'; 
                    centerFit(); 
                    updateBrightness(15); 
                }
            };
            if (isGLB) loaderGLB.load(filePath, (g) => setupObject(g.scene)); 
            else loaderSTL.load(filePath, (geo) => setupObject(new THREE.Mesh(geo), true));
        });
    }

    // --- 高级拉丝/镜面 Shader (已修复 GLSL 编译语法错误) ---
    function createMetalMaterial(texName, isBrushed, tintColorHex) {
        const mat = new THREE.MeshStandardMaterial({
            color: tintColorHex, 
            metalness: 1.0, 
            roughness: isBrushed ? 0.5 : 0.1, 
            side: THREE.DoubleSide,
            map: textureLoader.load(`textures/${texName}_2K-JPG_Color.jpg`),
            normalMap: isBrushed ? textureLoader.load(`textures/${texName}_2K-JPG_NormalGl.jpg`) : null,
            roughnessMap: textureLoader.load(`textures/${texName}_2K-JPG_Roughness.jpg`),
            envMapIntensity: isBrushed ? 0.6 : 1.2
        });
        
        if (isBrushed) {
            mat.onBeforeCompile = (shader) => {
                shader.uniforms.uRepeat = { value: 0.05 };
                shader.vertexShader = shader.vertexShader.replace('#include <common>', `#include <common>\nvarying vec3 vWorldPosition;varying vec3 vWorldNormal;`);
                shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `#include <worldpos_vertex>\nvWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;vWorldNormal = normalize(mat3(modelMatrix) * normal);`);
                
                // 修复 GLSL 语法错误（补全了 normal 的 vec3，scale 的 float 类型声明）
                shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    uniform float uRepeat;
                    vec3 getTriplanarBlend(vec3 normal) { vec3 blend = abs(normal); blend = pow(blend, vec3(4.0)); return blend / (blend.x + blend.y + blend.z); }
                    vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal, float scale) {
                        vec2 uvXY = vec2(worldPos.x, worldPos.y) * scale; 
                        vec2 uvZY = vec2(worldPos.z, worldPos.y) * scale; 
                        vec2 uvXZ = vec2(worldPos.x, worldPos.z) * scale;
                        vec4 colX = texture2D(tex, uvZY); vec4 colY = texture2D(tex, uvXZ); vec4 colZ = texture2D(tex, uvXY);
                        vec3 blend = getTriplanarBlend(normal); return colX * blend.x + colY * blend.y + colZ * blend.z;
                    }
                `);
                shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `#ifdef USE_MAP\ndiffuseColor.rgb *= triplanarTexture(map, vWorldPosition, vWorldNormal, uRepeat).rgb;\n#endif`);
            };
        }
        return mat;
    }

    function centerFit() {
        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        modelGroup.position.sub(center);
        const size = box.getSize(new THREE.Vector3());
        const dist = Math.max(size.x, size.y, size.z) * 1.8;
        camera.position.set(dist * 0.8, dist * 0.5, dist);
        controls.target.set(0,0,0); controls.update();
    }

    function updateBrightness(percent) {
        const intensity = (percent / 100) * 3.0;
        document.getElementById('brightnessValue').textContent = `${Math.round(percent)}%`;
        ledMeshes.forEach(c => c.material.emissiveIntensity = intensity);
        plateMeshes.forEach(c => c.material.emissiveIntensity = intensity * 0.5);
    }

    // ==========================================
    // 4. UI 交互逻辑
    // ==========================================
    
    // 面壳
    function updateFrontColor(hex) {
    const col = new THREE.Color(hex);
    // ✅ 修复：因为 sceneMeshes 里存的本身就全是面壳，直接遍历上色即可
    sceneMeshes.forEach(c => { 
        if (c.material) {
            c.material.color.copy(col); 
        }
    });
    document.getElementById('frontColorPicker').value = hex;
}
    document.querySelectorAll('#frontColorSwatches .square-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#frontColorSwatches .square-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            updateFrontColor(e.target.dataset.color);
        });
    });
    document.getElementById('frontColorPicker').addEventListener('input', (e) => {
        document.querySelectorAll('#frontColorSwatches .square-btn').forEach(b => b.classList.remove('active'));
        updateFrontColor(e.target.value);
    });

    // LED 灯光
    function updateLedColor(hex) {
        const col = new THREE.Color(hex);
        [...ledMeshes, ...plateMeshes].forEach(c => { c.material.color.copy(col); c.material.emissive.copy(col); });
        document.getElementById('ledColorPicker').value = hex;
    }
    document.querySelectorAll('#ledColorSwatches .square-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#ledColorSwatches .square-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            updateLedColor(e.target.dataset.color);
        });
    });
    document.getElementById('ledColorPicker').addEventListener('input', (e) => {
        document.querySelectorAll('#ledColorSwatches .square-btn').forEach(b => b.classList.remove('active'));
        updateLedColor(e.target.value);
    });

    // 背板金属
    document.querySelectorAll('#materialBrushed .square-btn, #materialMirror .square-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#materialBrushed .square-btn, #materialMirror .square-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            
            const isBrushed = e.target.dataset.type === 'brushed';
            const texName = isBrushed ? 'Metal011' : 'Metal049A';
            const tintColor = e.target.dataset.color;

            // 优化：只生成一次材质，而不是在循环里重复生成
            const newMaterial = createMetalMaterial(texName, isBrushed, tintColor);
            backMeshes.forEach(c => { 
                if(c.material) c.material.dispose(); 
                c.material = newMaterial; 
            });
        });
    });

    // 其他滑块和按钮
    document.getElementById('brightnessSlider').addEventListener('input', (e) => updateBrightness(e.target.value));
    document.getElementById('decomposeBtn').addEventListener('click', () => {
        isDecomposed = !isDecomposed;
        modelGroup.children.forEach(obj => {
            const m = obj.userData.move;
            if (m) {
                const target = isDecomposed ? { x: m.x||0, y: m.y||0, z: m.z||0 } : { x:0, y:0, z:0 };
                gsap.to(obj.position, { ...target, duration: 1, ease: "power2.inOut" });
            }
        });
        document.getElementById('decomposeBtn').innerText = isDecomposed ? '一键合并复原' : '一键解体检查内部';
    });

    // 循环 (修复了背景色重置导致的内存泄漏问题)
    function animate() {
        requestAnimationFrame(animate); 
        controls.update();
        
        const originalBg = scene.background; 
        scene.background = blackBgColor; // 使用全局常数，避免每秒 new 60 次导致卡顿
        
        scene.traverse(obj => { 
            if (!bloomLayer.test(obj.layers) && obj.isMesh) { 
                materials[obj.uuid] = obj.material; 
                obj.material = darkMaterial; 
            } 
        });
        
        bloomComposer.render();
        
        scene.traverse(obj => { 
            if (materials[obj.uuid]) { 
                obj.material = materials[obj.uuid]; 
                delete materials[obj.uuid]; 
            } 
        });
        
        scene.background = originalBg; 
        finalComposer.render();
    }

    init();
    
    // 监听缩放
    window.addEventListener('resize', () => {
        if(!container) return;
        camera.aspect = container.clientWidth / container.clientHeight; 
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight); 
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });
</script>
</body>
</html>
