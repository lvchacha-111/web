   function createBackMaterial(texName, isBrushed, tintColor = 0xffffff) {
    const map = textureLoader.load(`textures/${texName}_2K-JPG_Color.jpg`);
    const normalMap = textureLoader.load(`textures/${texName}_2K-JPG_NormalGl.jpg`);
    const roughnessMap = textureLoader.load(`textures/${texName}_2K-JPG_Roughness.jpg`);

    // 设置重复模式以支持三平面映射
    [map, normalMap, roughnessMap].forEach(t => {
        t.wrapS = THREE.RepeatWrapping;
        t.wrapT = THREE.RepeatWrapping;
    });

    const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(tintColor),
        map: map,
        normalMap: isBrushed ? normalMap : null,
        roughnessMap: roughnessMap,
        metalness: 1.0,
        roughness: 0.5,
        envMapIntensity: 0.5,
        side: THREE.DoubleSide
    });

    if (isBrushed) {
        mat.onBeforeCompile = (shader) => {
            // uRepeat 控制拉丝的密度
            // uStretch 控制拉丝的长度（数值越大，线条越长，越不容易出现横向纹路）
            shader.uniforms.uRepeat = { value: 0.2 }; 
            shader.uniforms.uStretch = { value: 0.02 }; 

            shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                #include <common>
                varying vec3 vWorldPosition;
                varying vec3 vWorldNormal;
            `);
            shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                #include <worldpos_vertex>
                vWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;
                vWorldNormal = normalize(mat3(modelMatrix) * normal);
            `);

            shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                #include <common>
                varying vec3 vWorldPosition;
                varying vec3 vWorldNormal;
                uniform float uRepeat;
                uniform float uStretch;

                vec3 getTriplanarBlend(vec3 normal) {
                    vec3 blend = abs(normal);
                    blend = pow(blend, vec3(4.0));
                    return blend / (blend.x + blend.y + blend.z);
                }

                vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal) {
                    // 核心修改：
                    // 在 XY 面（前后）和 ZY 面（左右），将 U 轴锁定为 Y (竖向)
                    // 在 XZ 面（顶底），将 U 轴锁定为 Z (纵向)
                    // 通过 uStretch 极大地拉伸 U 轴，使线条变长
                    
                    vec2 uvXY = vec2(worldPos.y * uStretch, worldPos.x * uRepeat);
                    vec2 uvZY = vec2(worldPos.y * uStretch, worldPos.z * uRepeat);
                    vec2 uvXZ = vec2(worldPos.z * uStretch, worldPos.x * uRepeat);

                    vec4 colX = texture2D(tex, uvZY);
                    vec4 colY = texture2D(tex, uvXZ);
                    vec4 colZ = texture2D(tex, uvXY);

                    vec3 blend = getTriplanarBlend(normal);
                    return colX * blend.x + colY * blend.y + colZ * blend.z;
                }
            `);

            shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
                #ifdef USE_MAP
                    vec4 sampledColor = triplanarTexture(map, vWorldPosition, vWorldNormal);
                    diffuseColor.rgb *= sampledColor.rgb;
                #endif
            `);
            
            shader.fragmentShader = shader.fragmentShader.replace('#include <roughnessmap_fragment>', `
                float roughnessFactor = roughness;
                #ifdef USE_ROUGHNESSMAP
                    roughnessFactor *= triplanarTexture(roughnessMap, vWorldPosition, vWorldNormal).r;
                #endif
            `);

            if (isBrushed) {
                shader.fragmentShader = shader.fragmentShader.replace('#include <normal_fragment_maps>', `
                    #ifdef USE_NORMALMAP
                        vec3 normalSample = triplanarTexture(normalMap, vWorldPosition, vWorldNormal).xyz * 2.0 - 1.0;
                        // 混合三平面法线
                        normal = normalize(normal + normalSample * 0.5); 
                    #endif
                `);
            }
        };
    }
    return mat;
}

 function loadSmartModel() {
        if (!currentParts) return;
        const stlLoader = new STLLoader();
        const gltfLoader = new GLTFLoader();
        const folderPath = `stl/${productId}/`; 
        let loadedCount = 0;

        currentParts.forEach(part => {
            const filePath = folderPath + part.file;
            const isGLB = filePath.toLowerCase().endsWith('.glb');

            const setupObject = (object, isFromSTL = false) => {
                loadedCount++;
                object.traverse((child) => {
                    if (child.isMesh) {
                        const originalColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xffffff);

                        // === 1. 分配材质 ===
                        if (part.type === 'back') {
                            child.material = createBackMaterial('Metal011', true);
                        } else if (part.type === 'led') {
                            child.material = new THREE.MeshStandardMaterial({ color: originalColor, emissive: originalColor, emissiveIntensity: 0, toneMapped: false });
                            child.layers.enable(BLOOM_SCENE); 
                        } else if (part.type === 'plate') {
                            child.material = new THREE.MeshStandardMaterial({ color: originalColor, roughness: 1, metalness: 0, emissive: originalColor, emissiveIntensity: 0 });
                            child.layers.enable(BLOOM_SCENE); 
                        } else if (part.type === 'front') {
                            child.material = new THREE.MeshStandardMaterial({ color: originalColor, roughness: 1, metalness: 0, envMapIntensity: 0.5, side: THREE.DoubleSide });
                        } else if (part.type === 'transparent') {
                            // 半透明材质
                            child.material = new THREE.MeshPhysicalMaterial({ 
                                color: originalColor,    
                                transparent: true,       
                                opacity: 0.5,            
                                roughness: 0.1,          
                                metalness: 0.1,          
                                depthWrite: false,       
                                side: THREE.DoubleSide   
                            });
                        }
// 在 loadSmartModel 中，确保添加这行日志调试
if (part.type === 'back') {
    backMeshes.push(object);
    console.log("已收集到 Back 部件:", object);
}
                        // === 2. 处理 STL 和 UV ===
                        if (isFromSTL) child.rotation.x = -Math.PI / 2;
                        
                        if (!child.geometry.attributes.uv) {
                            const pos = child.geometry.attributes.position;
                            const uv = [];
                            child.geometry.computeBoundingBox();
                            const box = child.geometry.boundingBox;
                            const size = box.getSize(new THREE.Vector3());
                            for (let i = 0; i < pos.count; i++) {
                                uv.push((pos.getX(i) - box.min.x) / (size.x || 1), (pos.getY(i) - box.min.y) / (size.y || 1));
                            }
                            child.geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
                        }
                    }
                }); 

                // === 3. 记录数据并添加到场景 ===
                object.position.set(0, 0, 0);
                object.userData = { move: part.move, type: part.type, change: part.change };
                sceneMeshes.push(object);
                if (part.type === 'back') backMeshes.push(object); // 正确收集back类型物体
                if (part.type === 'led') ledMeshes.push(object);
                if (part.type === 'plate') plateMeshes.push(object);
                modelGroup.add(object);

                // === 4. 检查是否加载完成 ===
                if (loadedCount === currentParts.length) {
                    document.getElementById('loading').style.display = 'none';
                    console.log("模型已加载，当前网格数量:", sceneMeshes.length); 
                    updateBrightness(15);
                    centerAndFitCamera(); 
                }
            }; 

            if (isGLB) {
                gltfLoader.load(filePath, (g) => setupObject(g.scene), undefined, (e) => console.error(e));
            } else {
                stlLoader.load(filePath, (geo) => setupObject(new THREE.Mesh(geo), true));
            }
        }); 
    }
  
    function centerAndFitCamera() {
        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        modelGroup.position.sub(center);
        
        const newBox = new THREE.Box3().setFromObject(modelGroup);
        const bottomY = newBox.min.y;
        const floorHeight = bottomY - 0.5;
        gridHelper.position.y = floorHeight;
        xAxis.position.y = floorHeight;
        zAxis.position.y = floorHeight;

        const size = newBox.getSize(new THREE.Vector3());
        let cameraDist = Math.max(size.x, size.y, size.z) * 1.8;
        camera.position.set(cameraDist * 0.8, cameraDist * 0.5, cameraDist);
        controls.target.set(0, 0, 0);
        controls.update();
        
        scene.fog.near = cameraDist * 0.5;
        scene.fog.far = cameraDist * 5.0;
    }

// 🌟 核心：背板材质点击事件 (完整实现)
// ==========================================
document.querySelectorAll('#materialOptions .material-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        if (e.currentTarget.classList.contains('disabled')) return;

        // 1. UI 状态切换
        document.querySelectorAll('#materialOptions .material-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        
        const type = e.currentTarget.dataset.type;
        const currentColor = new THREE.Color(document.getElementById('frontColorPicker').value);
        
        // 2. 交互控制区 DOM
        const frontPicker = document.getElementById('frontColorPicker');
        const colorSwatches = document.querySelectorAll('#frontPaintSection .color-swatch');

        // 3. 动态决定操作对象
        let targetMeshes = hasChange 
            ? sceneMeshes.filter(obj => obj.userData.type === 'front' && obj.userData.change === true)
            : sceneMeshes.filter(obj => obj.userData.type === 'back' );

        if (targetMeshes.length === 0) return;

        // 4. 执行逻辑与交互反馈
        if (type === 'paint') {
            document.getElementById('materialHint').textContent = `当前材质：喷漆模式`;
            
            // 启用颜色选择器和方块
            if (frontPicker) {
                frontPicker.style.pointerEvents = 'auto';
                frontPicker.style.opacity = '1';
            }
            colorSwatches.forEach(s => {
                s.classList.remove('disabled');
                s.style.pointerEvents = 'auto';
            });

            // 应用喷漆材质
            targetMeshes.forEach(obj => {
                obj.traverse(c => {
                    if (c.isMesh) {
                        c.material.dispose();
                        c.material = new THREE.MeshPhysicalMaterial({ 
                            color: currentColor, 
                            roughness: 0.4, 
                            metalness: 0.0, 
                            side: THREE.DoubleSide 
                        });
                        c.material.needsUpdate = true;
                    }
                });
            });
        } else {
            // 金属模式：禁用颜色选择器和方块
            if (frontPicker) {
                frontPicker.style.pointerEvents = 'none';
                frontPicker.style.opacity = '0.4';
            }
            colorSwatches.forEach(s => {
                s.classList.add('disabled');
                s.style.pointerEvents = 'none';
            });

            const metalMap = {
                'metal011': ['Metal011', true, 0xffffff, '银色拉丝'],
                'metal049a': ['Metal049A', false, 0xffffff, '银色镜面'],
                'copper_brushed': ['Metal011', true, 0xc07c51, '铜色拉丝'],
                'copper_mirror': ['Metal049A', false, 0xc07c51, '铜色镜面'],
                'rosegold_brushed': ['Metal011', true, 0xb76e79, '玫瑰金拉丝'],
                'rosegold_mirror': ['Metal049A', false, 0xb76e79, '玫瑰金镜面'],
                'gold_brushed': ['Metal011', true, 0xffd700, '金色拉丝'],
                'gold_mirror': ['Metal049A', false, 0xffd700, '金色镜面'],
                'black_brushed': ['Metal011', true, 0x333333, '黑色拉丝'],
                'black_mirror': ['Metal049A', false, 0x333333, '黑色镜面'],
                'brown_brushed': ['Metal011', true, 0x8b4513, '棕色拉丝'],
                'brown_mirror': ['Metal049A', false, 0x8b4513, '棕色镜面']
            };

            const config = metalMap[type] || metalMap['metal011'];
            document.getElementById('materialHint').textContent = `当前材质：${config[3]}`;

            targetMeshes.forEach(obj => {
                obj.traverse(c => {
                    if (c.isMesh) {
                        if (c.material) c.material.dispose();
                        c.material = createBackMaterial(config[0], config[1], config[2]);
                        c.material.needsUpdate = true;
                    }
                });
            });
        }
    });
});
    // ==========================================
    // 🌟 核心 2：面壳颜色监听器 (自动唤醒 PAINT 模式)
    // ==========================================
document.getElementById('frontColorPicker').addEventListener('input', (e) => {
    // 检查当前是否是 PAINT 模式
    const activeBtn = document.querySelector('#materialOptions .material-btn.active');
    const isPaintMode = activeBtn && activeBtn.dataset.type === 'paint';

    const colorValue = e.target.value;
    const col = new THREE.Color(colorValue);

    sceneMeshes.forEach(obj => { 
        // 规则：如果是 Paint 模式，front 和 back 都改；否则只改 front
        const shouldModify = isPaintMode 
            ? (obj.userData.type === 'front' || obj.userData.type === 'back')
            : (obj.userData.type === 'front');

        if (shouldModify) {
            obj.traverse(c => { 
                if(c.isMesh) c.material.color.copy(col); 
            }); 
        }
    });

    document.getElementById('frontColorHint').textContent = `当前颜色：${getColorName(colorValue)}`;
});
    // ==========================================
    // 🌟 核心 3：颜色方块点击事件 
    // ==========================================
    document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.addEventListener('click', () => {
            if (swatch.classList.contains('disabled')) return;

            const color = swatch.dataset.color;
            const container = swatch.closest('div[style*="flex-wrap: wrap"]'); // 找到包含方块的容器
            const section = container.parentElement; // 拿到包含颜色面板的父 div

            // 尝试直接通过 ID 获取，这样最稳妥
            const ledPicker = document.getElementById('ledColorPicker');
            const frontPicker = document.getElementById('frontColorPicker');

            // 判断当前点击的方块属于哪个区域
            // 通过查找方块的父容器是否包含某个特定的 ID 或者位置来区分
            const isLedSection = !!swatch.closest('#ledColorPicker')?.parentElement || (section.querySelector('#ledColorPicker') !== null);

            if (isLedSection) {
                // 处理 LED 灯光方块
                section.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                
                ledPicker.value = color;
                document.getElementById('ledColorHint').textContent = `当前灯光颜色：${getColorName(color)}`;
                ledPicker.dispatchEvent(new Event('input', { bubbles: true }));
            } 
            else {
                // 处理 面壳漆色方块
                // 1. 清除同区域的其他激活状态
                document.querySelectorAll('#frontPaintSection .color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');

                // 2. 赋值给拾色器并触发事件
                frontPicker.value = color;
                frontPicker.dispatchEvent(new Event('input', { bubbles: true }));
            }
        });
    });

    // === 一键解体 ===
    document.getElementById('decomposeBtn').addEventListener('click', () => {
        isDecomposed = !isDecomposed;
        sceneMeshes.forEach(obj => {
            const m = obj.userData.move;
            if (m) {
                const target = isDecomposed ? { x: m.x || 0, y: m.y || 0, z: m.z || 0 } : { x: 0, y: 0, z: 0 };
                gsap.to(obj.position, { x: target.x, y: target.y, z: target.z, duration: 1, ease: "power2.inOut" });
            }
        });
        document.getElementById('decomposeBtn').innerText = isDecomposed ? '一键合并' : '一键解体';
    });

    // 辉光渲染循环
    function darkenNonBloomed(obj) {
        if (bloomLayer.test(obj.layers) === false) {
            if (obj.isMesh) { materials[obj.uuid] = obj.material; obj.material = darkMaterial; } 
            else if (obj.isLine || obj.isLineSegments) { materials[obj.uuid] = obj.material; obj.material = darkLineMaterial; }
        }
    }
    function restoreMaterial(obj) {
        if (materials[obj.uuid]) { obj.material = materials[obj.uuid]; delete materials[obj.uuid]; }
    }
    function animate() { 
        requestAnimationFrame(animate); 
        controls.update(); 
        const originalBg = scene.background;
        scene.background = new THREE.Color(0x000000);
        scene.traverse(darkenNonBloomed);
        bloomComposer.render();
        scene.traverse(restoreMaterial);
        scene.background = originalBg;
        finalComposer.render();
    }
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        bloomComposer.setSize(container.clientWidth, container.clientHeight);
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });

    // === 必须加上这两行才能启动 3D 渲染！ ===
    loadSmartModel();
    animate();
    
</script>
