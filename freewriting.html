        .material-btn { width: 42px; height: 42px; border-radius: 4px; border: 2px solid #444; background-size: cover; cursor: pointer; }
        .material-btn.active { border-color: #f39c12; box-shadow: 0 0 5px #f39c12; }
        .material-btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #444;
            transition: transform 0.1s, border-color 0.1s;
            box-sizing: border-box;
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #f39c12;
        }
        .color-swatch.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;
        }
        #frontColorPicker, #ledColorPicker { width: 100%; height: 35px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; border-radius: 3px; }
        /* 跑马灯动画 - 给预设颜色色块加流光效果 */
@keyframes marquee-swatch {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* RGB流水灯色块的跑马灯效果 */
.color-swatch[data-color="FLOWRGB"] {
    background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, white);
    background-size: 200% 100%; /* 扩展背景尺寸用于滚动 */
    animation: marquee-swatch 3s linear infinite; /* 3秒一轮，匀速循环 */
}

/* RGB呼吸灯色块的呼吸效果 */
.color-swatch[data-color="RGB"] {
    background: linear-gradient(135deg, red, orange, yellow, green, blue, purple);
    background-size: 200% 200%;
    animation: marquee-swatch 4s linear infinite alternate; /* 4秒一轮，往返滚动 */
}
/* 新增：右上角 SVG 上传控件样式 */
/* 修改原有的容器样式，增加过渡动画 */
/* 修改右上角面板为右下角悬浮窗 */
/* 修改容器：改为右下角，默认隐藏 */
#svg-upload-container {
    position: absolute;
    bottom: 30px; /* 距离底部 */
    right: 30px;  /* 距离右侧 */
    top: auto;    /* 取消顶部定位 */
    z-index: 1000;
    background: rgba(30, 30, 30, 0.9);
    padding: 0 12px 12px 12px; /* 顶部不需要padding，留给手柄 */
    border-radius: 8px;
    border: 1px solid #f39c12;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    width: 220px;
    transition: opacity 0.3s; /* 仅保留淡入淡出 */
}

/* 拖拽手柄样式 */
#panel-drag-handle {
    width: calc(100% + 24px);
    margin: 0 -12px 10px -12px;
    height: 30px;
    background: #333;
    border-radius: 8px 8px 0 0;
    cursor: move;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #666;
    border-bottom: 1px solid #444;
}
#panel-drag-handle:hover {
    background: #3d3d3d;
    color: #f39c12;
}

/* 移除旧的箭头样式（如果还存在的话） */
#panel-toggle-btn { display: none !important; }
.upload-label {
    font-size: 11px;
    font-weight: bold;
    color: #f39c12;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.upload-btns {
    display: flex;
    gap: 8px;
}
.small-btn {
    padding: 6px 10px !important;
    font-size: 11px !important;
    margin: 0 !important;
    flex: 1; /* 按钮等宽 */
}
.danger-btn {
    background: #c0392b !important;
    border-color: #a93226 !important;
}
.toggle-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #2980b9 !important;
}
.snapshot-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #27ae60 !important;
}
/* 修改容器宽度以适应新布局 */
#svg-upload-container {
    width: 200px !important; /* 调整宽度 */
}
/* 内部内容容器的淡入淡出逻辑 */
#panel-inner-content {
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 15px; /* 给箭头留出空间 */
}
#svg-upload-container.collapsed #panel-inner-content {
    opacity: 0;
    pointer-events: none; /* 收缩时不可点击 */
}

/* 箭头旋转动画 */
#toggle-icon {
    transition: transform 0.4s;
    display: inline-block;
}
#svg-upload-container.collapsed #toggle-icon {
    transform: rotate(180deg); /* 展开时指向右，收缩时指向左 */
}
.svg-note { font-size: 11px; color: #aaa; margin-top: 2px; }
/* 选中状态强化 */
.color-swatch.active.marquee-active {
    border-color: #f39c12;
    box-shadow: 0 0 8px #f39c12, 0 0 12px rgba(243, 156, 18, 0.5);
}
        #textInput {

        .action-btn:hover { background: #555; border-color: #f39c12; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; z-index: 100; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 8px;}
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f39c12; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { body { flex-direction: column; } #sidebar { width: 100%; height: 45vh; } #canvas-container { height: 55vh; } }

        .note { font-size: 11px; color: #888; margin-top: 5px; text-align: center; border-top: 1px solid #3a3a3a; padding-top: 8px; }
        
        .thickness-control {
            background: #3a3a3a;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #f39c12;
            margin-top: 5px;
        }

            margin-top: 0;
        }
/* 数字输入框的样式 */
.num-input {

        /* 禁用状态的遮罩层 */

function getFlowTexture() {
    if (flowTexture) return flowTexture;
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 1;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 256, 0);
    gradient.addColorStop(0, "red");
    gradient.addColorStop(0.2, "yellow");
    gradient.addColorStop(0.4, "lime");
    gradient.addColorStop(0.6, "cyan");
    gradient.addColorStop(0.8, "blue");
    gradient.addColorStop(1, "red");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 256, 1);
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping; // 允许横向循环
    flowTexture = tex;
    return flowTexture;
}

        const map = textureLoader.load(`textures/${texName}_2K-JPG_Color.jpg`);
        const normalMap = textureLoader.load(`textures/${texName}_2K-JPG_NormalGl.jpg`);
        const roughnessMap = textureLoader.load(`textures/${texName}_2K-JPG_Roughness.jpg`);

        [map, normalMap, roughnessMap].forEach(t => {
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
        });

       // 在 createBackMaterial 函数中
const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(tintColor),
    map: map,
    normalMap: isBrushed ? normalMap : null,
    roughnessMap: roughnessMap,
    metalness: 1.0,
    roughness:1,
    side: THREE.DoubleSide, // 关键：改为双面渲染，确保内部不透视
    transparent: false, 
    fog: false,    // 彻底关闭透明
    opacity: 1.0,           // 强制 100% 不透明
    depthWrite: true        // 开启深度写入，遮挡内部
});

        if (isBrushed) {
            mat.onBeforeCompile = (shader) => {
                shader.uniforms.uRepeat = { value: 0.15 }; 
                shader.uniforms.uStretch = { value: 0.02 }; 

                shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                `);
                shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                    #include <worldpos_vertex>
                    vWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;
                    vWorldNormal = normalize(mat3(modelMatrix) * normal);
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    uniform float uRepeat;
                    uniform float uStretch;

                    vec3 getTriplanarBlend(vec3 normal) {
                        vec3 blend = abs(normal);
                        blend = pow(blend, vec3(4.0));
                        return blend / (blend.x + blend.y + blend.z);
                    }

                    vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal) {
                        vec2 uvXY = vec2(worldPos.y * uStretch, worldPos.x * uRepeat);
                        vec2 uvZY = vec2(worldPos.y * uStretch, worldPos.z * uRepeat);
                        vec2 uvXZ = vec2(worldPos.z * uStretch, worldPos.x * uRepeat);

                        vec4 colX = texture2D(tex, uvZY);
                        vec4 colY = texture2D(tex, uvXZ);
                        vec4 colZ = texture2D(tex, uvXY);

                        vec3 blend = getTriplanarBlend(normal);
                        return colX * blend.x + colY * blend.y + colZ * blend.z;
                    }
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
                    #ifdef USE_MAP
                        vec4 sampledColor = triplanarTexture(map, vWorldPosition, vWorldNormal);
                        diffuseColor.rgb *= sampledColor.rgb;
                    #endif
                `);
                
                shader.fragmentShader = shader.fragmentShader.replace('#include <roughnessmap_fragment>', `
                    float roughnessFactor = roughness;
                    #ifdef USE_ROUGHNESSMAP
                        roughnessFactor *= triplanarTexture(roughnessMap, vWorldPosition, vWorldNormal).r;
                    #endif
                `);

                if (isBrushed) {
                    shader.fragmentShader = shader.fragmentShader.replace('#include <normal_fragment_maps>', `
                        #ifdef USE_NORMALMAP
                            vec3 normalSample = triplanarTexture(normalMap, vWorldPosition, vWorldNormal).xyz * 2.0 - 1.0;
                            normal = normalize(normal + normalSample * 0.8); 
                        #endif
                    `);
                }
            };
        }
        return mat;
    }

function createTextLabel(text, position, scaleFactor = 1.0) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256;
    canvas.height = 128;
    ctx.font = 'Bold 60px Arial';
    ctx.fillStyle = '#f39c12'; 
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 80);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.scale.set(12 * scaleFactor, 6 * scaleFactor, 1);
    sprite.position.copy(position);
    return sprite;
}

function takeSnapshot() {
    // 1. 记录原始尺寸和像素比
    const originalWidth = container.clientWidth;
    const originalHeight = container.clientHeight;
    const originalPixelRatio = renderer.getPixelRatio();

    // 2. 设置截图倍率 (2 代表 2倍清晰度，3 代表超高清/4K级别)
    const zoom = 3; 
    
    // 3. 临时放大渲染器
    renderer.setSize(originalWidth * zoom, originalHeight * zoom, false);
    // 辉光合成器也要跟着放大，否则发光效果会变小
    bloomComposer.setSize(originalWidth * zoom, originalHeight * zoom);
    finalComposer.setSize(originalWidth * zoom, originalHeight * zoom);

    // 4. 执行高清渲染
    // 这一步非常关键：必须完整渲染后处理通道
    finalComposer.render();

    // 5. 导出图片 (使用最高质量)
    const dataURL = renderer.domElement.toDataURL('image/png', 1.0);

    // 6. 触发下载
    const link = document.createElement('a');
    const timestamp = new Date().getTime();
    link.download = `YiJiao_4K_Design_${timestamp}.png`;
    link.href = dataURL;
    link.click();

    // 7. 恢复原始尺寸，避免用户界面变大
    renderer.setPixelRatio(originalPixelRatio);
    renderer.setSize(originalWidth, originalHeight);
    bloomComposer.setSize(originalWidth, originalHeight);
    finalComposer.setSize(originalWidth, originalHeight);
    
    // 8. 重新渲染一次正常的画面，确保 UI 回归正常
    finalComposer.render();

    console.log("高清 4K 实拍图已导出");
}
function updateDimensions() {
    dimensionGroup.clear();
    if (textGroup.children.length === 0) return;

    // 1. 获取模型当前的全局包围盒
    const box = new THREE.Box3().setFromObject(textGroup);
    const size = new THREE.Vector3();
    box.getSize(size);
    const min = box.min;
    const max = box.max;
    
    // 计算模型的中心 Z 轴，让 X/Y 标注线始终处于模型厚度的中间
    const midZ = (min.z + max.z) / 2;

    const scaleFactor = textSize / 26; 
    const offset = 5 * scaleFactor; 
    const tick = 1 * scaleFactor; 
    const lineMat = new THREE.LineBasicMaterial({ color: 0x888888 });

    // --- 1. X轴标注 (宽度) ---
    const widthText = (size.x * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const xBasePos = new THREE.Vector3((min.x + max.x)/2, min.y - offset - (4 * scaleFactor), midZ);
    const xLabel = createTextLabel(widthText, xBasePos.clone().add(labelManualOffsets.x), scaleFactor);
    xLabel.userData.axis = 'x';
    dimensionGroup.add(xLabel);

    const xLinePoints = [
        new THREE.Vector3(min.x, min.y - offset, midZ), new THREE.Vector3(max.x, min.y - offset, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x, min.y - offset + tick, midZ), new THREE.Vector3(min.x, min.y - offset - tick, midZ),
        new THREE.Vector3(max.x, min.y - offset + tick, midZ), new THREE.Vector3(max.x, min.y - offset - tick, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(xLinePoints), lineMat));


    // --- 2. Y轴标注 (高度) ---
    const heightText = (size.y * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const yBasePos = new THREE.Vector3(min.x - offset - (8 * scaleFactor), (min.y + max.y)/2, midZ);
    const yLabel = createTextLabel(heightText, yBasePos.clone().add(labelManualOffsets.y), scaleFactor);
    yLabel.userData.axis = 'y';
    dimensionGroup.add(yLabel);

    const yLinePoints = [
        new THREE.Vector3(min.x - offset, min.y, midZ), new THREE.Vector3(min.x - offset, max.y, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x - offset + tick, min.y, midZ), new THREE.Vector3(min.x - offset - tick, min.y, midZ),
        new THREE.Vector3(min.x - offset + tick, max.y, midZ), new THREE.Vector3(min.x - offset - tick, max.y, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(yLinePoints), lineMat));


    // --- 3. Z轴标注 (厚度) ---
    const thicknessText = (size.z * 10).toFixed(0) + " mm"; 
    // Z轴标注本来就参考了 min.z/max.z，所以它之前就是稳的
    const zBasePos = new THREE.Vector3(max.x + offset + (6 * scaleFactor), min.y, midZ);
    const zLabel = createTextLabel(thicknessText, zBasePos.clone().add(labelManualOffsets.z), scaleFactor);
    zLabel.userData.axis = 'z';
    dimensionGroup.add(zLabel);

    const zLinePoints = [
        new THREE.Vector3(max.x + offset, min.y, min.z), new THREE.Vector3(max.x + offset, min.y, max.z),
        new THREE.Vector3(max.x + offset - tick, min.y, min.z), new THREE.Vector3(max.x + offset + tick, min.y, min.z),
        new THREE.Vector3(max.x + offset - tick, min.y, max.z), new THREE.Vector3(max.x + offset + tick, min.y, max.z)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(zLinePoints), lineMat));
}

function generate3DText(textString, adjustCamera = true) {
    if (!isSvgMode && !currentFont) {
        loadFontAndGenerate('helvetiker', textString, adjustCamera);
        return;
    }

    // 1. 清理旧模型
    while (textGroup.children.length > 0) {
        const obj = textGroup.children[0];
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
        }
        textGroup.remove(obj);
    }
    frontMeshes = []; backMeshes = []; singleMesh = null; ledPixels = [];
    isDecomposed = false; 
    document.getElementById('decomposeBtn').innerText = '一键解体 (Explode)';

    // 2. 初始化颜色和材质 (防止报错的关键)
    const ledColorVal = document.getElementById('ledColorPicker').value;
    const ledColor = new THREE.Color(ledColorVal);
    
    // 获取面板独立颜色 Colour Attribute
    const cAttrPickerVal = document.getElementById('colourAttrPicker').value;
    const cAttrColor = new THREE.Color(cAttrPickerVal);

    const ledMat = new THREE.MeshStandardMaterial({ 
        color: ledColor, emissive: ledColor, emissiveIntensity: 0, 
        roughness: 1.0, metalness: 0.0, side: THREE.DoubleSide
    });
    
    const colourAttrMat = new THREE.MeshStandardMaterial({
        color: cAttrColor,
        roughness: 0.6,
        metalness: 0.2,
        side: THREE.DoubleSide
    });

    const capMat = createBackMaterial(currentTexName, true, currentTintColor);

    // 3. 计算几何体
    const fDepth = frontThickness / 10; 
    const bDepth = backThickness / 10;  
    if (!isSvgMode && !textString.trim()) return;

    let fGeo, bGeo, singleGeo, innerGeo;
    const commonExtrude = { bevelEnabled: false, steps: 1, caps: true };

    if (isSvgMode && svgPaths) {
        const shapes = [];
        svgPaths.forEach(path => shapes.push(...SVGLoader.createShapes(path)));
        fGeo = new THREE.ExtrudeGeometry(shapes, { ...commonExtrude, depth: fDepth });
        bGeo = new THREE.ExtrudeGeometry(shapes, { ...commonExtrude, depth: bDepth });
        singleGeo = new THREE.ExtrudeGeometry(shapes, { ...commonExtrude, depth: fDepth + bDepth });
        innerGeo = new THREE.ExtrudeGeometry(shapes, { ...commonExtrude, depth: 0.1 }); // 0.01mm

        [fGeo, bGeo, singleGeo, innerGeo].forEach(geo => {
            geo.computeBoundingBox();
            const h = geo.boundingBox.max.y - geo.boundingBox.min.y;
            const scale = textSize / h;
            geo.applyMatrix4(new THREE.Matrix4().makeScale(scale, -scale * yScale, 1));
            geo.computeBoundingBox();
            const cx = -0.5 * (geo.boundingBox.max.x + geo.boundingBox.min.x);
            const cy = -0.5 * (geo.boundingBox.max.y + geo.boundingBox.min.y);
            geo.translate(cx, cy, 0);
        });
    } else {
        const refSize = 10;
        const tempGeo = new TextGeometry(textString, { ...commonExtrude, font: currentFont, size: refSize, height: 0 });
        tempGeo.computeBoundingBox();
        const finalScale = textSize / (tempGeo.boundingBox.max.y - tempGeo.boundingBox.min.y);
        const scaledFontSize = refSize * finalScale; 

        fGeo = new TextGeometry(textString, { ...commonExtrude, font: currentFont, size: scaledFontSize, height: fDepth });
        bGeo = new TextGeometry(textString, { ...commonExtrude, font: currentFont, size: scaledFontSize, height: bDepth });
        singleGeo = new TextGeometry(textString, { ...commonExtrude, font: currentFont, size: scaledFontSize, height: fDepth + bDepth });
        innerGeo = new TextGeometry(textString, { ...commonExtrude, font: currentFont, size: scaledFontSize, height: 0.1 });

        [fGeo, bGeo, singleGeo, innerGeo].forEach(geo => {
            geo.scale(1, yScale, 1);
            geo.computeBoundingBox();
            const cx = -0.5 * (geo.boundingBox.max.x + geo.boundingBox.min.x);
            const cy = -0.5 * (geo.boundingBox.max.y + geo.boundingBox.min.y);
            geo.translate(cx, cy, 0);
        });
    }

    // 4. Mesh 生成逻辑
    if (glowMode === 'sideGlowTest') {
        const tinyGap = 0.005;
        
        // 侧面（中间发光层）
        const glowMesh = new THREE.Mesh(fGeo, ledMat); // 使用 ledMat (发光色)
        glowMesh.position.set(0, 0, 0);
        glowMesh.userData.baseZ = 0;
        glowMesh.layers.enable(BLOOM_SCENE);

        // 面板（最前面不发光层）
        const colourMesh = new THREE.Mesh(innerGeo, colourAttrMat); // 使用 colourAttrMat (面板色)
        const frontPos = fDepth + tinyGap;
        colourMesh.position.set(0, 0, frontPos);
        colourMesh.userData.baseZ = frontPos;

        // --- 后面：封底层 (Fixed) ---
        const fixedMat = new THREE.MeshStandardMaterial({ color: 0x222222 }); 
        const fixedMesh = new THREE.Mesh(innerGeo, fixedMat); 
        const backPos = -tinyGap - 0.1;
        fixedMesh.position.set(0, 0, backPos);
        fixedMesh.userData.baseZ = backPos;

        textGroup.add(colourMesh, glowMesh, fixedMesh);
        frontMeshes.push(colourMesh, glowMesh);
        backMeshes.push(fixedMesh);
    } 
    else if (glowMode === 'acrylicCut' || glowMode === 'metalCut') {
        const mat = (glowMode === 'acrylicCut') ? new THREE.MeshStandardMaterial({color: ledColor}) : capMat;
        const mesh = new THREE.Mesh(singleGeo, mat);
        textGroup.add(mesh);
        singleMesh = mesh;
    } 
    else if (glowMode === 'frontBackGlow') {
        const tinyGap = 0.005;
        bGeo.translate(0, 0, -bDepth); // 修正背面位置
        const bMesh = new THREE.Mesh(bGeo, capMat); 
        bMesh.position.set(0, 0, 0); 
        bMesh.userData.baseZ = 0;
        const fMeshForward = new THREE.Mesh(fGeo, ledMat);
        fMeshForward.position.set(0, 0, tinyGap); 
        fMeshForward.userData.baseZ = tinyGap;
        fMeshForward.layers.enable(BLOOM_SCENE);
        const fMeshBackward = new THREE.Mesh(fGeo, ledMat);
        const backPos = -bDepth - tinyGap;
        fMeshBackward.position.set(0, 0, backPos); 
        fMeshBackward.userData.baseZ = backPos;
        fMeshBackward.layers.enable(BLOOM_SCENE);
        textGroup.add(bMesh, fMeshForward, fMeshBackward);
        frontMeshes.push(fMeshForward, fMeshBackward);
        backMeshes.push(bMesh);
    }
    else {
        const tinyGap = 0.005;
        bGeo.translate(0, 0, -bDepth);
        const isBackGlow = (glowMode === 'backGlow');
        const fMesh = new THREE.Mesh(fGeo, isBackGlow ? capMat : ledMat);
        const bMesh = new THREE.Mesh(bGeo, isBackGlow ? ledMat : capMat);
        fMesh.position.set(0, 0, tinyGap); 
        bMesh.position.set(0, 0, -tinyGap); 
        fMesh.userData.baseZ = tinyGap; bMesh.userData.baseZ = -tinyGap; 
        if (glowMode === 'frontGlow' || glowMode === 'testFrontGlow') fMesh.layers.enable(BLOOM_SCENE);
        else bMesh.layers.enable(BLOOM_SCENE);
        textGroup.add(fMesh, bMesh);
        frontMeshes.push(fMesh); backMeshes.push(bMesh);
    }

    updateBrightness(document.getElementById('brightnessSlider').value);
    if (adjustCamera) centerAndFitCamera();
    setTimeout(() => { updateDimensions(); }, 50);
}

                        shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                            #include <worldpos_vertex>
                            vWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;
                        `);

                            uniform float uTime;
                            uniform float uIntensity;
                            vec3 hsv2rgb(vec3 c) {
                                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                            }
                        `);

                        shader.fragmentShader = shader.fragmentShader.replace('#include <dithering_fragment>', `
                            #include <dithering_fragment>
                            float hue = fract(vWorldPos.x * 0.02 - uTime * 0.5);
                            vec3 rainbow = hsv2rgb(vec3(hue, 0.9, 1.0));

                        mesh.material.userData.shader = shader;
                    };

                if (mesh.material.userData.shader) {

    }
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        bloomComposer.setSize(container.clientWidth, container.clientHeight);
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });
    
    animate();
</script>
</body>
</html>
