<head>

    <title>Yi Jiao · 自由书写 (支持中文)</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #393939;
            font-family: 'Microsoft YaHei', sans-serif;
            color: white;
        }

        body {
            display: flex;
            flex-direction: row;
        }

        #sidebar {
            width: 320px;
            min-width: 320px;
            height: 100vh;
            background: #2c2c2c;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            box-sizing: border-box;
        }

        #canvas-container {
            flex: 1;
            height: 100%;
            position: relative;
            background-color: #393939;
            min-width: 0;
        }

        .color-swatch-container.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .header-box {
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-box h1 {
            font-size: 18px;
            color: #f39c12;
            margin: 0;
            letter-spacing: 1px;
        }

        .back-btn {
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            padding: 4px 8px;
            background: #3d3d3d;
            border-radius: 3px;
            border: 1px solid #555;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #bbb;
            font-weight: bold;
            margin-top: 10px;
        }

        .option-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .material-btn {
            width: 42px;
            height: 42px;
            border-radius: 4px;
            border: 2px solid #444;
            background-size: cover;
            cursor: pointer;
        }

        .material-btn.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;
        }

        .material-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #444;
            transition: transform 0.1s, border-color 0.1s;
            box-sizing: border-box;
        }

        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #f39c12;
        }

        .color-swatch.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;
        }

        #frontColorPicker,
        #ledColorPicker {
            width: 100%;
            height: 35px;
            border: 1px solid #444;
            background: none;
            cursor: pointer;
            padding: 0;
            border-radius: 3px;
        }

        /* 跑马灯动画 - 给预设颜色色块加流光效果 */
        @keyframes marquee-swatch {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* RGB流水灯色块的跑马灯效果 */
        .color-swatch[data-color="FLOWRGB"] {
            background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, white);
            background-size: 200% 100%;
            /* 扩展背景尺寸用于滚动 */
            animation: marquee-swatch 3s linear infinite;
            /* 3秒一轮，匀速循环 */
        }

        /* RGB呼吸灯色块的呼吸效果 */
        .color-swatch[data-color="RGB"] {
            background: linear-gradient(135deg, red, orange, yellow, green, blue, purple);
            background-size: 200% 200%;
            animation: marquee-swatch 4s linear infinite alternate;
            /* 4秒一轮，往返滚动 */
        }

        /* 新增：右上角 SVG 上传控件样式 */
        /* 修改原有的容器样式，增加过渡动画 */
        /* 修改右上角面板为右下角悬浮窗 */
        /* 修改容器：改为右下角，默认隐藏 */
        #svg-upload-container {
            position: absolute;
            bottom: 30px;
            /* 距离底部 */
            right: 30px;
            /* 距离右侧 */
            top: auto;
            /* 取消顶部定位 */
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            padding: 0 12px 12px 12px;
            /* 顶部不需要padding，留给手柄 */
            border-radius: 8px;
            border: 1px solid #f39c12;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 220px;
            transition: opacity 0.3s;
            /* 仅保留淡入淡出 */
        }

        /* 拖拽手柄样式 */
        #panel-drag-handle {
            width: calc(100% + 24px);
            margin: 0 -12px 10px -12px;
            height: 30px;
            background: #333;
            border-radius: 8px 8px 0 0;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
            border-bottom: 1px solid #444;
        }

        #panel-drag-handle:hover {
            background: #3d3d3d;
            color: #f39c12;
        }

        /* 移除旧的箭头样式（如果还存在的话） */
        #panel-toggle-btn {
            display: none !important;
        }

        .upload-label {
            font-size: 11px;
            font-weight: bold;
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upload-btns {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            padding: 6px 10px !important;
            font-size: 11px !important;
            margin: 0 !important;
            flex: 1;
            /* 按钮等宽 */
        }

        .danger-btn {
            background: #c0392b !important;
            border-color: #a93226 !important;
        }

        .toggle-btn {
            padding: 8px !important;
            font-size: 12px !important;
            background: #2980b9 !important;
        }

        .snapshot-btn {
            padding: 8px !important;
            font-size: 12px !important;
            background: #27ae60 !important;
        }

        /* 修改容器宽度以适应新布局 */
        #svg-upload-container {
            width: 200px !important;
            /* 调整宽度 */
        }

        /* 内部内容容器的淡入淡出逻辑 */
        #panel-inner-content {
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
            /* 给箭头留出空间 */
        }

        #svg-upload-container.collapsed #panel-inner-content {
            opacity: 0;
            pointer-events: none;
            /* 收缩时不可点击 */
        }

        /* 箭头旋转动画 */
        #toggle-icon {
            transition: transform 0.4s;
            display: inline-block;
        }

        #svg-upload-container.collapsed #toggle-icon {
            transform: rotate(180deg);
            /* 展开时指向右，收缩时指向左 */
        }

        .svg-note {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }

        /* 选中状态强化 */
        .color-swatch.active.marquee-active {
            border-color: #f39c12;
            box-shadow: 0 0 8px #f39c12, 0 0 12px rgba(243, 156, 18, 0.5);
        }

        #textInput {
            width: 100%;
            padding: 12px;
            background: #eee;
            border: none;
            color: #000;
            font-size: 20px;
            border-radius: 4px;
            outline: none;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        #textInput:focus {
            box-shadow: 0 0 0 3px #f39c12;
        }

        #fontSelector,
        #craftSelect {
            width: 100%;
            padding: 10px;
            background: #3d3d3d;
            border: 1px solid #555;
            color: white;
            font-size: 14px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            margin-bottom: 5px;
        }

        #fontSelector option,
        #craftSelect option {
            background: #2c2c2c;
        }

        input[type=range] {
            width: 100%;
            padding: 8px;
            background: #3d3d3d;
            border: 1px solid #555;
            color: white;
            border-radius: 3px;
            outline: none;
            box-sizing: border-box;
        }

        input[type=range]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background: #4a4a4a;
            border: 1px solid #666;
            color: white;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            margin-top: auto;
        }

        .action-btn:hover {
            background: #555;
            border-color: #f39c12;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #333;
            border-color: #444;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: 45vh;
            }

            #canvas-container {
                height: 55vh;
            }
        }

        .note {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: center;
            border-top: 1px solid #3a3a3a;
            padding-top: 8px;
        }

        .thickness-control {
            background: #3a3a3a;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #f39c12;
            margin-top: 5px;
        }

        .thickness-control label {
            margin-top: 0;
        }

        /* 数字输入框的样式 */
        .num-input {
            width: 50px;
            background: #4a4a4a;
            border: 1px solid #555;
            color: #f39c12;
            /* 橙色文字 */
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 13px;
            text-align: center;
            outline: none;
        }

        /* 鼠标点击输入框时的效果 */
        .num-input:focus {
            border-color: #f39c12;
            background: #555;
        }

        /* 隐藏数字调节的小箭头（可选，为了美观） */
        .num-input::-webkit-inner-spin-button {
            display: none;
        }

        /* 禁用状态的遮罩层 */
        .disabled-overlay {
            position: relative;
            opacity: 0.4;
            pointer-events: none;
        }

        .disabled-picker {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* 隐藏元素的类 */
        .hidden {
            display: none !important;
        }
    </style>

<body>
    <div id="sidebar">
        <div class="header-box">
            <h1 id="pageTitle">Freewriting-svg导入</h1>
            <a href="index.html" class="back-btn">← 返回</a>
        </div>

        <!-- 工艺选择下拉菜单 -->
        <div>
            <label>⚙️ 工艺选择</label>
            <select id="craftSelect">
                <option value="backGlow" selected>侧面与背面发光-M005C-N001</option>
                <option value="frontGlow">侧面一半和正面发光-M006</option>
                <option value="testFrontGlow">正面发光-M024</option>
                <option value="frontBackGlow">正面与背面发光N008</option>
                <option value="sideGlowTest">侧面发光-N015</option>
                <option value="sideHalfGlowTest">侧面一半发光-N013</option>
                <option value="testBackGlow">背面发光-M005B</option>
                <option value="neonWord">霓虹灯字N019</option>
                <option value="neonWord012">霓虹灯字-N018</option> 
                <option value="neonWord013">霓虹灯字(内嵌槽)</option>
                <option value="neonBorder">霓虹字围边</option> 
                <option value="acrylicCut">亚克力切割字(Acrylic Cut)</option>
                <option value="metalCut">金属字(Metal Cut)</option>

            </select>
        </div>

        <div>
            <label style="color:#f39c12">✎ 输入文字 (中 / 英)</label>
            <input type="text" id="textInput" value="YiJiao" placeholder="输入中文或英文">
        </div>

        <div>
            <label>🔤 字体选择</label>
            <select id="fontSelector">
                <option value="helvetiker" selected>英文字体 Helvetiker</option>
                <option value="Forte">forte常规字</option>
                <option value="STXingkai_Regular">中文字体 行书 </option>
                <option value="SimHei">中文字体 黑体</option>

                <option value="neonFont05">Balmonde_Regular</option>
                <option value="neonFont">The Absolute_Regular</option>
                <option value="neonFont02">NEONCITY Script_Regular</option>
                <option value="neonFont03">London Handlettering_Regular</option>
                <option value="neonFont04">Damion_Regular</option>
            </select>
        </div>

        <div id="materialSection">
            <!-- 修改为左右对齐的 Flex 布局 -->
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; margin-top: 10px;">
                <label style="margin: 0;">🧱 材质选择</label>
                <span style="font-size: 12px; color: #f39c12; font-weight: bold; letter-spacing: 1px;">
                    当前：<span id="currentMatName">金属拉丝</span>
                </span>
            </div>

            <div class="option-group" id="materialOptions">
                <div class="material-btn" data-type="paint"
                    style="background-color: #e74c3c; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: bold; border-color: #e74c3c;"
                    title="面壳烤漆">Paint</div>

                <div class="material-btn active" style="background-image: url('textures/Metal011_2K-JPG_Color.jpg');"
                    data-type="metal011" title="金属拉丝"></div>
                <div class="material-btn" style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg');"
                    data-type="metal049a" title="金属镜面"></div>
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #c07c51; background-blend-mode: multiply;"
                    data-type="copper_brushed" title="铜色拉丝"></div>
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #c07c51; background-blend-mode: multiply;"
                    data-type="copper_mirror" title="铜色镜面"></div>
                <!-- 白银色拉丝 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #e0e0e0; background-blend-mode: multiply;"
                    data-type="silver_brushed" title="白银色拉丝"></div>
                <!-- 白银色镜面 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #e0e0e0; background-blend-mode: multiply;"
                    data-type="silver_mirror" title="白银色镜面"></div>
                <!-- 玫瑰金拉丝 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #b76e79; background-blend-mode: multiply;"
                    data-type="rosegold_brushed" title="玫瑰金拉丝"></div>
                <!-- 玫瑰金镜面 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #b76e79; background-blend-mode: multiply;"
                    data-type="rosegold_mirror" title="玫瑰金镜面"></div>
                <!-- 金色拉丝 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #ffd700; background-blend-mode: multiply;"
                    data-type="gold_brushed" title="金色拉丝"></div>
                <!-- 金色镜面 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #ffd700; background-blend-mode: multiply;"
                    data-type="gold_mirror" title="金色镜面"></div>
                <!-- 黑色拉丝 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #333333; background-blend-mode: multiply;"
                    data-type="black_brushed" title="黑色拉丝"></div>
                <!-- 黑色镜面 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #333333; background-blend-mode: multiply;"
                    data-type="black_mirror" title="黑色镜面"></div>
                <!-- 棕色拉丝 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal011_2K-JPG_Color.jpg'); background-color: #8b4513; background-blend-mode: multiply;"
                    data-type="brown_brushed" title="棕色拉丝"></div>
                <!-- 棕色镜面 -->
                <div class="material-btn"
                    style="background-image: url('textures/Metal049A_2K-JPG_Color.jpg'); background-color: #8b4513; background-blend-mode: multiply;"
                    data-type="brown_mirror" title="棕色镜面"></div>

            </div>
            <!-- 新增：面壳烤漆颜色选择器 -->
            <div id="paintColorSection" class="hidden"
                style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #555;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin: 0; color:#e74c3c">🎨 面壳漆色 (Paint Color)</label>
                </div>

                <div class="paint-color-swatch-container"
                    style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;">
                    <div class="color-swatch paint-swatch" style="background-color: #FFA500;" data-color="#FFA500"
                        title="橘"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #FFFF00;" data-color="#FFFF00"
                        title="黄"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #FFC0CB;" data-color="#FFC0CB"
                        title="粉"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #0000FF;" data-color="#0000FF"
                        title="蓝"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #00FF00;" data-color="#00FF00"
                        title="绿"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #FF0000;" data-color="#FF0000"
                        title="红"></div>
                    <div class="color-swatch paint-swatch active"
                        style="background-color: #FFFFFF; border: 2px solid #888;" data-color="#FFFFFF" title="标准白">
                    </div>
                    <div class="color-swatch paint-swatch" style="background-color: #F0F8FF; border: 2px solid #888;"
                        data-color="#F0F8FF" title="高亮白（冷白）"></div>
                    <div class="color-swatch paint-swatch" style="background-color: #FAF0E6; border: 2px solid #888;"
                        data-color="#FAF0E6" title="暗淡白（暖白）"></div>
                </div>
                <label style="font-size: 11px; color: #888;">自定义漆色：</label>
                <input type="color" id="paintColorPicker" value="#ffffff"
                    style="width: 100%; height: 30px; cursor: pointer; border: 1px solid #444; background: none;">
            </div>
        </div>

        <div id="tintSection">
            <label>🎨 金属调色 (Tint Color)</label>
            <input type="color" id="frontColorPicker" value="#ffffff">
        </div>






        <!-- 新增：Colour 属性专用颜色选择器 -->
        <!-- 修改后的 Colour 属性专用区域 -->

        const createBlurRef = (geo, isWall, ledColor) => {
            const blurGroup = new THREE.Group();
            const layerCount = 3;
            for (let i = 0; i < layerCount; i++) {
                const mat = new THREE.MeshBasicMaterial({
                    color: ledColor,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });

                    m.userData.isFloorRef = true;
                }
                m.userData.layerIndex = i;
                blurGroup.add(m);
            }
            return blurGroup;

                    shader.vertexShader = shader.vertexShader.replace('#include <common>', `

                        #include <common>
                        varying vec3 vWorldPosition;
                        varying vec3 vWorldNormal;
                        uniform float uRepeat;
                        uniform float uStretch;

                        vec3 getTriplanarBlend(vec3 normal) {
                            vec3 blend = abs(normal);
                            blend = pow(blend, vec3(4.0));
                            return blend / (blend.x + blend.y + blend.z);
                        }

                        vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal) {
                            vec2 uvXY = vec2(worldPos.y * uStretch, worldPos.x * uRepeat);
                            vec2 uvZY = vec2(worldPos.y * uStretch, worldPos.z * uRepeat);
                            vec2 uvXZ = vec2(worldPos.z * uStretch, worldPos.x * uRepeat);

                            vec4 colX = texture2D(tex, uvZY);
                            vec4 colY = texture2D(tex, uvXZ);
                            vec4 colZ = texture2D(tex, uvXY);

                            vec3 blend = getTriplanarBlend(normal);
                            return colX * blend.x + colY * blend.y + colZ * blend.z;
                        }
                    `);

                    shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `

                            vec4 sampledColor = triplanarTexture(map, vWorldPosition, vWorldNormal);
                            diffuseColor.rgb *= sampledColor.rgb;
                        #endif
                    `);

                // 4. 应用颜色。乘以 2.0 保证亮度
                totalEmissiveRadiance *= softColor * 2.0;
                `

        // 获取新增的 Colour 属性颜色

             }*/
            // 【6. 最后创建 Mesh 并加入 textGroup】

      if (isSvgMode && svgPaths) {

                // 核心比例：由当前滑块数值 / 像素高度
                const scale = textSize / pixelH;

                const currentFrontDepth = frontThickness / 10;

                innerGeo = new THREE.ExtrudeGeometry(shapes, { ...commonExtrude, depth: ledThinness / scale });
                // 4. 生成单体几何体 (用于其他模式)

                [fGeo, bGeo, innerGeo, singleGeo].forEach(geo => {

            }else {
    const refSize = 10;

}
                const scaledFontSize = refSize * finalScale;

            // 6. Mesh 生成并登记 flowMeshes

                // 原位: -0.1 (紧贴围边底部 Z=0 位)

                textGroup.add(fixedMesh);
                backMeshes = [fixedMesh];
            }
            // --- 新增/修复：正面与背面发光 (三层结构) ---
else if (glowMode === 'frontBackGlow') {
                const fDepth = frontThickness / 10; // 中间材质壳的厚度 (受正面滑块控制)
                const ledThinness = 0.1;            // 前后LED固定厚度 (1mm)
                const gap = 0.05;                   // 物理间隙

                const mLED = new THREE.Mesh(innerGeo, ledMat); // 背面显示发光灯片

                    neonGeo = new THREE.ExtrudeGeometry(shapes, { ...tubeSettings, depth: 0.1 / scale });

                    const tempGeo = new TextGeometry("A", { font: currentFont, size: refSize, height: 0 });
                    tempGeo.computeBoundingBox();

                const cx = -0.5 * (neonGeo.boundingBox.max.x + neonGeo.boundingBox.min.x);

    function centerAndFitCamera() {
    if (textGroup.children.length === 0) return;

    const box = new THREE.Box3().setFromObject(textGroup);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // 文字组对齐原点
    textGroup.position.x = -center.x;
    textGroup.position.y = -center.y;

    // 动态计算相机距离
    const maxDim = Math.max(size.x, size.y);
    const fov = camera.fov * (Math.PI / 180);
    
    // 自动计算合适的后退距离，并留出 20% 的余量
    let cameraDist = Math.abs((maxDim / 2) / Math.tan(fov / 2)) * 1.5;
    
    // 如果物体很大（如 77cm），cameraDist 会自动计算到 150cm 左右
    cameraDist = Math.max(cameraDist, 60); 

    camera.position.set(0, 0, cameraDist);
    camera.far = cameraDist * 10; // 调大远裁剪面
    camera.updateProjectionMatrix();

       function animate() {

            requestAnimationFrame(animate);

            if (document.hidden) return;

            delta += clock.getDelta();

            if (controls) controls.update();

            const brightnessSlider = document.getElementById('brightnessSlider');
            const safeBrightness = brightnessSlider ? (parseFloat(brightnessSlider.value) / 100) : 0.15;
            const currentTime = performance.now() * 0.001;

            // --- 1. 计算当前基准颜色 ---
            let activeColor = new THREE.Color(document.getElementById('ledColorPicker').value);

            if (isFlowRGB) {
                activeColor.setHSL((currentTime * 0.5) % 1, 0.8, 0.5);
            } else if (isRGBGlow) {
                rgbHue += 0.002;
                activeColor.setHSL(rgbHue % 1, 1.0, 0.5);
            }

            // --- 2. 更新主物体颜色 (这是最吃性能的循环) ---
            if ((isRGBGlow || isFlowRGB) && glowMode !== 'acrylicCut' && glowMode !== 'metalCut') {
                [...frontMeshes, ...backMeshes, ...colourMeshes].forEach(obj => {
                    if (obj && obj.material && obj.userData.isLed) {
                        if (!isFlowRGB) {
                            obj.material.color.copy(activeColor);
                            if (obj.layers.test(bloomLayer) && obj.material.emissive) {

                            }
                        }
                        if (obj.layers.test(bloomLayer) && obj.material.emissive) {
                            if (isRGBGlow) {
                                const breath = (Math.sin(currentTime * 2.0) + 1.0) / 2.0;
                                obj.material.emissiveIntensity = safeBrightness * (0.5 + breath * 1.5);
                            } else {
                                obj.material.emissiveIntensity = safeBrightness * 1.5;
                            }
                        }
                    }
                });
            }

            // --- 3. 动画 Shader 时间更新 ---
            if (isFlowRGB && flowMeshes.length > 0) {
                flowMeshes.forEach(mesh => {
                    if (mesh.material && mesh.material.userData && mesh.material.userData.uTime) {
                        mesh.material.userData.uTime.value = currentTime;
                    }
                });
            }

            renderSceneAll();

            delta = delta % interval;
        }
        // 3. 窗口自适应监听
        // --- 终极整合键盘监听器 (放在 animate() 之后) ---
        window.addEventListener('keydown', (e) => {
            // 如果正在输入框输入，不触发快捷键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const panel = document.getElementById('svg-upload-container');

            // --- 1. 使用 ] 键实现浮窗显示/隐藏 (带 GSAP 动画) ---
            if (e.key === ']' || e.key === '}') {
                const isHidden = !panel.style.display || panel.style.display === 'none' || window.getComputedStyle(panel).display === 'none';
                if (isHidden) {
                    panel.style.display = 'block';
                    gsap.fromTo(panel, { opacity: 0, y: 20, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.3 });
                } else {
                    gsap.to(panel, {
                        opacity: 0, y: 20, scale: 0.9, duration: 0.2, onComplete: () => {
                            panel.style.display = 'none';
                        }
                    });
                }
            }

            // --- 2. M 键切换移动模式 ---
            if (e.key.toLowerCase() === 'm') {
                if (selectedObject) {
                    isMoveModeActive = !isMoveModeActive;

                    if (isMoveModeActive) {
                        controls.enabled = false; // 锁定相机
                        container.style.cursor = 'move';
                        outlinePass.edgeStrength = 10.0; // 描边加亮提示
                        setupDragPlane(selectedObject.position, selectedObject.position);
                        console.log("进入移动模式:", selectedObject.name || "选中物体");
                    } else {
                        controls.enabled = true; // 恢复相机
                        container.style.cursor = 'pointer';
                        outlinePass.edgeStrength = 3.0; // 描边恢复
                        console.log("退出移动模式");
                    }
                } else {
                    alert("请先点击选中一个物体（文字、背景或背板），再按 M 键。");
                }
            }

            // --- 3. Delete / Backspace 键删除逻辑 ---
            // --- 3. Delete / Backspace 键删除逻辑 ---
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedObject) {
                    // 判定并移除物体
                    if (selectedObject === lPlateGroup) {
                        scene.remove(lPlateGroup);
                        if (platePointLight) {
                            scene.remove(platePointLight);
                            platePointLight = null;
                        }
                        lPlateGroup = null;
                        console.log("背板及光效已移除");
                           labelManualOffsets.pW.set(0,0,0);
            labelManualOffsets.pH.set(0,0,0);
            labelManualOffsets.pT.set(0,0,0);
            updateDimensions(); // 立即重新计算，此时 if(lPlateGroup) 为假，背板标注会消失
                    } else if (selectedObject === bgPlaneMesh) {
                        scene.remove(bgPlaneMesh);
                        bgPlaneMesh = null;
                        document.getElementById('clearBgBtn').classList.add('hidden');
                    } else if (selectedObject === textGroup) {
                        console.warn("文字组不可直接删除");
                        return;
                    }

                    // 执行完删除后，再统一清理选中状态
                    selectedObject = null;
                    outlinePass.selectedObjects = [];
                    isMoveModeActive = false;
                    controls.enabled = true;
                    container.style.cursor = 'default';
                }
            }

        });
        // 绑定“添加/重置背板”按钮
        document.getElementById('addPlateBtn').addEventListener('click', () => {
            // 调用你已有的创建背板函数
            createLPlate();

            // 如果你希望添加背板后文字能自动对齐，可以顺便调用一次居中
            centerAndFitCamera();

            console.log("背板已重新生成并添加至场景");
        });
        // 监听宽度输入
        document.getElementById('plateWidthInput').addEventListener('change', (e) => {
            plateWidth = Math.max(10, parseFloat(e.target.value) || 10);
            if (lPlateGroup) createLPlate(); // 如果背板存在，立即更新
        });

        // 监听高度输入
        document.getElementById('plateHeightInput').addEventListener('change', (e) => {
            plateHeight = Math.max(10, parseFloat(e.target.value) || 10);
            if (lPlateGroup) createLPlate();
        });

        // 监听颜色选择器
        document.getElementById('plateColorPicker').addEventListener('input', (e) => {
            plateColor = e.target.value;
            // 如果背板已经存在，直接修改材质颜色，不需要重新创建几何体（更流畅）
            if (lPlateGroup) {
                lPlateGroup.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.color.set(plateColor);
                    }
                });
            }
        });
        // 4. 启动程序
        animate();
    </script>
</body>

</html>
