        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #393939; font-family: 'Microsoft YaHei', sans-serif; color: white; }
        body { display: flex; flex-direction: row; }
        #sidebar { width: 320px; min-width: 320px; height: 100vh; background: #2c2c2c; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 20; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; box-sizing: border-box; }
        #canvas-container { flex: 1; height: 100%; position: relative; background-color: #393939; min-width: 0; }
        .color-swatch-container.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .header-box { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .header-box h1 { font-size: 18px; color: #f39c12; margin: 0; letter-spacing: 1px; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 12px; padding: 4px 8px; background: #3d3d3d; border-radius: 3px; border: 1px solid #555;}
        
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #bbb; font-weight: bold; margin-top: 10px; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .material-btn { width: 42px; height: 42px; border-radius: 4px; border: 2px solid #444; background-size: cover; cursor: pointer; }
        .material-btn.active { border-color: #f39c12; box-shadow: 0 0 5px #f39c12; }
        .material-btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #444;
            transition: transform 0.1s, border-color 0.1s;
            box-sizing: border-box;
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #f39c12;
        }
        .color-swatch.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;
        }
        #frontColorPicker, #ledColorPicker { width: 100%; height: 35px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; border-radius: 3px; }
        /* 跑马灯动画 - 给预设颜色色块加流光效果 */
@keyframes marquee-swatch {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* RGB流水灯色块的跑马灯效果 */
.color-swatch[data-color="FLOWRGB"] {
    background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, white);
    background-size: 200% 100%; /* 扩展背景尺寸用于滚动 */
    animation: marquee-swatch 3s linear infinite; /* 3秒一轮，匀速循环 */
}

/* RGB呼吸灯色块的呼吸效果 */
.color-swatch[data-color="RGB"] {
    background: linear-gradient(135deg, red, orange, yellow, green, blue, purple);
    background-size: 200% 200%;
    animation: marquee-swatch 4s linear infinite alternate; /* 4秒一轮，往返滚动 */
}
/* 新增：右上角 SVG 上传控件样式 */
/* 修改原有的容器样式，增加过渡动画 */
#svg-upload-container {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(44, 44, 44, 0.95);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #555;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 弹性过渡动画 */
    overflow: hidden; /* 关键：收缩时隐藏内容 */
    width: 240px; /* 固定展开时的宽度 */
}

/* 收缩状态下的样式 */
#svg-upload-container.collapsed {
    width: 30px;  /* 刚好容纳箭头 */
    height: 30px; /* 刚好容纳箭头 */
    padding: 5px;
    background: rgba(44, 44, 44, 0.6);
    border-color: #f39c12; /* 收缩时边缘变亮提示 */
}

/* 箭头按钮样式 */
#panel-toggle-btn {
    position: absolute;
    top: 0;
    right: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #f39c12;
    font-size: 16px;
    font-weight: bold;
    background: rgba(0,0,0,0.2);
    border-radius: 0 6px 0 6px;
    transition: background 0.3s;
}
#panel-toggle-btn:hover {
    background: rgba(243, 156, 18, 0.2);
}
/* 右上角面板内部行列布局 */
.upload-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 5px;
}
.upload-label {
    font-size: 11px;
    font-weight: bold;
    color: #f39c12;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.upload-btns {
    display: flex;
    gap: 8px;
}
.small-btn {
    padding: 6px 10px !important;
    font-size: 11px !important;
    margin: 0 !important;
    flex: 1; /* 按钮等宽 */
}
.danger-btn {
    background: #c0392b !important;
    border-color: #a93226 !important;
}
.toggle-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #2980b9 !important;
}
.snapshot-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #27ae60 !important;
}
/* 修改容器宽度以适应新布局 */
#svg-upload-container {
    width: 200px !important; /* 调整宽度 */
}
/* 内部内容容器的淡入淡出逻辑 */
#panel-inner-content {
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 15px; /* 给箭头留出空间 */
}
#svg-upload-container.collapsed #panel-inner-content {
    opacity: 0;
    pointer-events: none; /* 收缩时不可点击 */
}

/* 箭头旋转动画 */
#toggle-icon {
    transition: transform 0.4s;
    display: inline-block;
}
#svg-upload-container.collapsed #toggle-icon {
    transform: rotate(180deg); /* 展开时指向右，收缩时指向左 */
}
.svg-note { font-size: 11px; color: #aaa; margin-top: 2px; }
/* 选中状态强化 */
.color-swatch.active.marquee-active {
    border-color: #f39c12;
    box-shadow: 0 0 8px #f39c12, 0 0 12px rgba(243, 156, 18, 0.5);
}
        #textInput { 
            width: 100%; padding: 12px; background: #eee; border: none;

        input[type=range] { width: 100%; padding: 8px; background: #3d3d3d; border: 1px solid #555; color: white; border-radius: 3px; outline: none; box-sizing: border-box; }
        input[type=range]:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .action-btn { width: 100%; padding: 12px; background: #4a4a4a; border: 1px solid #666; color: white; font-weight: bold; border-radius: 3px; cursor: pointer; margin-top: auto; }
        .action-btn:hover { background: #555; border-color: #f39c12; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #333; border-color: #444; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; z-index: 100; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 8px;}
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f39c12; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { body { flex-direction: column; } #sidebar { width: 100%; height: 45vh; } #canvas-container { height: 55vh; } }

        .note { font-size: 11px; color: #888; margin-top: 5px; text-align: center; border-top: 1px solid #3a3a3a; padding-top: 8px; }
        
        .thickness-control {
            background: #3a3a3a;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #f39c12;
            margin-top: 5px;
        }
        .thickness-control label {
            margin-top: 0;
        }
/* 数字输入框的样式 */
.num-input {
    width: 50px;
    background: #4a4a4a;
    border: 1px solid #555;
    color: #f39c12; /* 橙色文字 */
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 13px;
    text-align: center;
    outline: none;
}
/* 鼠标点击输入框时的效果 */
.num-input:focus {
    border-color: #f39c12;
    background: #555;
}
/* 隐藏数字调节的小箭头（可选，为了美观） */
.num-input::-webkit-inner-spin-button {
    display: none;
}
        /* 禁用状态的遮罩层 */
        .disabled-overlay { position: relative; opacity: 0.4; pointer-events: none; }
        .disabled-picker { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        
        /* 隐藏元素的类 */
        .hidden { display: none !important; }

function getFlowTexture() {

    function createBackMaterial(texName, isBrushed, tintColor = 0xffffff) {
        const map = textureLoader.load(`textures/${texName}_2K-JPG_Color.jpg`);
        const normalMap = textureLoader.load(`textures/${texName}_2K-JPG_NormalGl.jpg`);
        const roughnessMap = textureLoader.load(`textures/${texName}_2K-JPG_Roughness.jpg`);

        [map, normalMap, roughnessMap].forEach(t => {
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
        });

       // 在 createBackMaterial 函数中
const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(tintColor),
    map: map,
    normalMap: isBrushed ? normalMap : null,
    roughnessMap: roughnessMap,
    metalness: 1.0,
    roughness:1,
    side: THREE.DoubleSide, // 关键：改为双面渲染，确保内部不透视
    transparent: false,     // 彻底关闭透明
    opacity: 1.0,           // 强制 100% 不透明
    depthWrite: true        // 开启深度写入，遮挡内部
});

        if (isBrushed) {
            mat.onBeforeCompile = (shader) => {
                shader.uniforms.uRepeat = { value: 0.15 }; 
                shader.uniforms.uStretch = { value: 0.02 }; 

                shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                `);
                shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                    #include <worldpos_vertex>
                    vWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;
                    vWorldNormal = normalize(mat3(modelMatrix) * normal);
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    uniform float uRepeat;
                    uniform float uStretch;

                    vec3 getTriplanarBlend(vec3 normal) {
                        vec3 blend = abs(normal);
                        blend = pow(blend, vec3(4.0));
                        return blend / (blend.x + blend.y + blend.z);
                    }

                    vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal) {
                        vec2 uvXY = vec2(worldPos.y * uStretch, worldPos.x * uRepeat);
                        vec2 uvZY = vec2(worldPos.y * uStretch, worldPos.z * uRepeat);
                        vec2 uvXZ = vec2(worldPos.z * uStretch, worldPos.x * uRepeat);

                        vec4 colX = texture2D(tex, uvZY);
                        vec4 colY = texture2D(tex, uvXZ);
                        vec4 colZ = texture2D(tex, uvXY);

                        vec3 blend = getTriplanarBlend(normal);
                        return colX * blend.x + colY * blend.y + colZ * blend.z;
                    }
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
                    #ifdef USE_MAP
                        vec4 sampledColor = triplanarTexture(map, vWorldPosition, vWorldNormal);
                        diffuseColor.rgb *= sampledColor.rgb;
                    #endif
                `);
                
                shader.fragmentShader = shader.fragmentShader.replace('#include <roughnessmap_fragment>', `
                    float roughnessFactor = roughness;
                    #ifdef USE_ROUGHNESSMAP
                        roughnessFactor *= triplanarTexture(roughnessMap, vWorldPosition, vWorldNormal).r;
                    #endif
                `);

                if (isBrushed) {
                    shader.fragmentShader = shader.fragmentShader.replace('#include <normal_fragment_maps>', `
                        #ifdef USE_NORMALMAP
                            vec3 normalSample = triplanarTexture(normalMap, vWorldPosition, vWorldNormal).xyz * 2.0 - 1.0;
                            normal = normalize(normal + normalSample * 0.8); 
                        #endif
                    `);
                }
            };
        }
        return mat;
    }

function createTextLabel(text, position, scaleFactor = 1.0) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256;
    canvas.height = 128;
    ctx.font = 'Bold 60px Arial';
    ctx.fillStyle = '#f39c12'; 
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 80);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.scale.set(12 * scaleFactor, 6 * scaleFactor, 1);
    sprite.position.copy(position);
    return sprite;
}

function takeSnapshot() {
    // 1. 记录原始尺寸和像素比
    const originalWidth = container.clientWidth;
    const originalHeight = container.clientHeight;
    const originalPixelRatio = renderer.getPixelRatio();

    // 2. 设置截图倍率 (2 代表 2倍清晰度，3 代表超高清/4K级别)
    const zoom = 3; 
    
    // 3. 临时放大渲染器
    renderer.setSize(originalWidth * zoom, originalHeight * zoom, false);
    // 辉光合成器也要跟着放大，否则发光效果会变小
    bloomComposer.setSize(originalWidth * zoom, originalHeight * zoom);
    finalComposer.setSize(originalWidth * zoom, originalHeight * zoom);

    // 4. 执行高清渲染
    // 这一步非常关键：必须完整渲染后处理通道
    finalComposer.render();

    // 5. 导出图片 (使用最高质量)
    const dataURL = renderer.domElement.toDataURL('image/png', 1.0);

    // 6. 触发下载
    const link = document.createElement('a');
    const timestamp = new Date().getTime();
    link.download = `YiJiao_4K_Design_${timestamp}.png`;
    link.href = dataURL;
    link.click();

    // 7. 恢复原始尺寸，避免用户界面变大
    renderer.setPixelRatio(originalPixelRatio);
    renderer.setSize(originalWidth, originalHeight);
    bloomComposer.setSize(originalWidth, originalHeight);
    finalComposer.setSize(originalWidth, originalHeight);
    
    // 8. 重新渲染一次正常的画面，确保 UI 回归正常
    finalComposer.render();

    console.log("高清 4K 实拍图已导出");
}
function updateDimensions() {
    dimensionGroup.clear();
    if (textGroup.children.length === 0) return;

    // 1. 获取模型当前的全局包围盒
    const box = new THREE.Box3().setFromObject(textGroup);
    const size = new THREE.Vector3();
    box.getSize(size);
    const min = box.min;
    const max = box.max;
    
    // 计算模型的中心 Z 轴，让 X/Y 标注线始终处于模型厚度的中间
    const midZ = (min.z + max.z) / 2;

    const scaleFactor = textSize / 26; 
    const offset = 5 * scaleFactor; 
    const tick = 1 * scaleFactor; 
    const lineMat = new THREE.LineBasicMaterial({ color: 0x888888 });

    // --- 1. X轴标注 (宽度) ---
    const widthText = (size.x * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const xBasePos = new THREE.Vector3((min.x + max.x)/2, min.y - offset - (4 * scaleFactor), midZ);
    const xLabel = createTextLabel(widthText, xBasePos.clone().add(labelManualOffsets.x), scaleFactor);
    xLabel.userData.axis = 'x';
    dimensionGroup.add(xLabel);

    const xLinePoints = [
        new THREE.Vector3(min.x, min.y - offset, midZ), new THREE.Vector3(max.x, min.y - offset, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x, min.y - offset + tick, midZ), new THREE.Vector3(min.x, min.y - offset - tick, midZ),
        new THREE.Vector3(max.x, min.y - offset + tick, midZ), new THREE.Vector3(max.x, min.y - offset - tick, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(xLinePoints), lineMat));


    // --- 2. Y轴标注 (高度) ---
    const heightText = (size.y * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const yBasePos = new THREE.Vector3(min.x - offset - (8 * scaleFactor), (min.y + max.y)/2, midZ);
    const yLabel = createTextLabel(heightText, yBasePos.clone().add(labelManualOffsets.y), scaleFactor);
    yLabel.userData.axis = 'y';
    dimensionGroup.add(yLabel);

    const yLinePoints = [
        new THREE.Vector3(min.x - offset, min.y, midZ), new THREE.Vector3(min.x - offset, max.y, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x - offset + tick, min.y, midZ), new THREE.Vector3(min.x - offset - tick, min.y, midZ),
        new THREE.Vector3(min.x - offset + tick, max.y, midZ), new THREE.Vector3(min.x - offset - tick, max.y, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(yLinePoints), lineMat));


    // --- 3. Z轴标注 (厚度) ---
    const thicknessText = (size.z * 10).toFixed(0) + " mm"; 
    // Z轴标注本来就参考了 min.z/max.z，所以它之前就是稳的
    const zBasePos = new THREE.Vector3(max.x + offset + (6 * scaleFactor), min.y, midZ);
    const zLabel = createTextLabel(thicknessText, zBasePos.clone().add(labelManualOffsets.z), scaleFactor);
    zLabel.userData.axis = 'z';
    dimensionGroup.add(zLabel);

    const zLinePoints = [
        new THREE.Vector3(max.x + offset, min.y, min.z), new THREE.Vector3(max.x + offset, min.y, max.z),
        new THREE.Vector3(max.x + offset - tick, min.y, min.z), new THREE.Vector3(max.x + offset + tick, min.y, min.z),
        new THREE.Vector3(max.x + offset - tick, min.y, max.z), new THREE.Vector3(max.x + offset + tick, min.y, max.z)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(zLinePoints), lineMat));
}

function generate3DText(textString, adjustCamera = true) {
    if (!isSvgMode && !currentFont) {
        loadFontAndGenerate('helvetiker', textString, adjustCamera);
        return;
    }

    // 1. 清理旧模型
    while (textGroup.children.length > 0) {
        const obj = textGroup.children[0];
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
        }
        textGroup.remove(obj);
    }

const bgInput = document.getElementById('bgInput');

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        const loader = new THREE.TextureLoader();
        loader.load(event.target.result, (texture) => {
            // 1. 如果已有背景，先移除
            if (bgPlaneMesh) {
                scene.remove(bgPlaneMesh);
                bgPlaneMesh.geometry.dispose();
                bgPlaneMesh.material.dispose();
            }

            // 2. 计算比例，防止图片拉伸
            const aspect = texture.image.width / texture.image.height;
            const bgHeight = 300; // 设定一个基础高度
            const bgWidth = bgHeight * aspect;

            // 3. 创建背景平面
            const geometry = new THREE.PlaneGeometry(bgWidth, bgHeight);
            const material = new THREE.MeshBasicMaterial({ 
    map: texture, 
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 1.0, // 可以调回 1.0 让图片更清晰
    fog: false    // 关键点：禁用雾化效果，这样无论相机多远，图片颜色都保持原样
});
            
            bgPlaneMesh = new THREE.Mesh(geometry, material);
            
            // 4. 将背景放在模型后面 (Z 轴负方向)
            bgPlaneMesh.position.set(0, 0, -100); 
            scene.add(bgPlaneMesh);

            // 显示移除按钮
            clearBgBtn.classList.remove('hidden');
        });
    };
    reader.readAsDataURL(file);
    e.target.value = ''; // 清空选择器
});

            val = Math.max(5, Math.min(40, val));
            depthInput.value = val.toFixed(1);
            depthSlider.value = val;
            boxDepth = val;
            if (glowMode === 'boxLight') {
                generate3DText(document.getElementById('textInput').value, false);
            }
        });
    }

    // --- 4. 一键解体按钮 ---
 document.getElementById('decomposeBtn').addEventListener('click', () => {
    if (glowMode === 'acrylicCut' || glowMode === 'metalCut' || glowMode === 'boxLight') return; 

    isDecomposed = !isDecomposed;
    const explodeGap = 20; // 解体时的总位移

    if (frontMeshes.length > 0 && backMeshes.length > 0) {
        const fMesh = frontMeshes[0];
        const bMesh = backMeshes[0];

        // 动画：正面物体
        gsap.to(fMesh.position, { 
            // 如果解体，去到 gap 位置；如果合并，回到初始记录的 baseZ (比如 0.0005)
            z: isDecomposed ? explodeGap : (fMesh.userData.baseZ || 0), 
            duration: 1, 
            ease: "power2.inOut",
            // 关键：在动画过程中实时调用 updateDimensions，让标注线跟着动
            onUpdate: () => {
                if (typeof updateDimensions === 'function') updateDimensions();
            }
        });

        // 动画：背面物体
        gsap.to(bMesh.position, { 
            // 如果解体，去到 -gap 位置；如果合并，回到初始记录的 baseZ (比如 -0.0005)
            z: isDecomposed ? -explodeGap : (bMesh.userData.baseZ || 0), 
            duration: 1, 
            ease: "power2.inOut" 
        });
    }

    // 更新按钮文字
    document.getElementById('decomposeBtn').innerText = isDecomposed ? '一键合并' : '一键解体 (Explode)';
});

    // --- 5. 文字和字体输入监听 ---
    document.getElementById('textInput').addEventListener('input', (e) => {
        if (currentFont) generate3DText(e.target.value, true);
    });

    document.getElementById('fontSelector').addEventListener('change', (e) => {
        const selected = e.target.value;
        const currentText = document.getElementById('textInput').value;
        loadFontAndGenerate(selected, currentText, true);
    });
    // 颜色方块点击事件
   document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
        if (glowMode === 'metalCut') return;

        // 移除所有色块的active状态
        document.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.remove('active', 'marquee-active');
        });
        
        // 给当前点击的色块添加active状态
        swatch.classList.add('active');

        const color = swatch.dataset.color;

        if (color === 'FLOWRGB') {
             swatch.classList.add('marquee-active');
        isFlowRGB = true;
        isRGBGlow = false;
        updateBrightness(80); // 跑马灯通常需要高亮度
        } else if (color === 'RGB') {
            // 开启RGB呼吸灯 - 给色块加跑马灯激活状态
            swatch.classList.add('marquee-active');
            isRGBGlow = true;
            isFlowRGB = false;
        } else {
            // 普通颜色 - 关闭所有动态效果
            isFlowRGB = false;
            isRGBGlow = false;

              backMeshes.concat(frontMeshes).forEach(m => {
            m.material.emissiveMap = null;
        });
        }
    });
});
// --- 纵向拉伸倍率联动 (Scale Y) ---
    
  

    // --- 文字基准大小联动 (Size) ---
    const textSizeSlider = document.getElementById('textSizeSlider');
    const textSizeInput = document.getElementById('textSizeInput');

    // 这里注意：要删掉你代码里之前可能存在的旧 textSizeSlider 监听器
    if(textSizeSlider) {
        textSizeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if(textSizeInput) textSizeInput.value = val; // 同步数字框
            textSize = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    if(textSizeInput) {
        textSizeInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val)) val = 26;
            val = Math.max(10, Math.min(100, val)); // 限制范围 10~100
            textSizeInput.value = val;
            textSizeSlider.value = val; // 同步滑块
            textSize = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    // --- 以下是原本就有的初始化代码，保持不动 ---
    updateUIState();
    loadFontAndGenerate('helvetiker', document.getElementById('textInput').value, true);
    // ==========================================
    // 渲染循环
    // ==========================================
    function darkenNonBloomed(obj) {
        if (bloomLayer.test(obj.layers) === false) {
            if (obj.isMesh) {
                materials[obj.uuid] = obj.material;
                obj.material = darkMaterial;
            } else if (obj.isLine || obj.isLineSegments) {
                materials[obj.uuid] = obj.material;
                obj.material = darkLineMaterial;
            }
        }
    }

    function restoreMaterial(obj) {
        if (materials[obj.uuid]) {
            obj.material = materials[obj.uuid];
            delete materials[obj.uuid];
        }
    }

    let scanX = 0; // 全局扫描位置
// 鼠标按下：检测是否点中标签
// --- 统一的鼠标按下事件 ---
container.addEventListener('pointerdown', (event) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // 1. 优先检测标注标签
    const labelIntersects = raycaster.intersectObjects(dimensionGroup.children);
    if (labelIntersects.length > 0) {
        selectedLabel = labelIntersects[0].object;
        isDraggingLabel = true;
        controls.enabled = false;
        container.style.cursor = 'move';
        return;
    }

    // 2. 检测 3D 文字物体
    const objectIntersects = raycaster.intersectObjects(textGroup.children, true);
    if (objectIntersects.length > 0) {
        isDraggingObject = true;
        activeDragTarget = textGroup; // 设置拖拽目标为文字
        controls.enabled = false;
        container.style.cursor = 'move';
        
        setupDragPlane(objectIntersects[0].point, textGroup.position);
        return;
    }

    // 3. 检测背景图 (bgPlaneMesh)
    if (bgPlaneMesh) {
        const bgIntersects = raycaster.intersectObject(bgPlaneMesh);
        if (bgIntersects.length > 0) {
            isDraggingObject = true;
            activeDragTarget = bgPlaneMesh; // 设置拖拽目标为背景
            controls.enabled = false;
            container.style.cursor = 'move';
            
            setupDragPlane(bgIntersects[0].point, bgPlaneMesh.position);
        }
    }
});

// 辅助函数：设置拖拽平面
function setupDragPlane(intersectPoint, targetPosition) {
    const normal = new THREE.Vector3();
    camera.getWorldDirection(normal).negate();
    dragPlane.setFromNormalAndCoplanarPoint(normal, intersectPoint);
    dragOffset.copy(intersectPoint).sub(targetPosition);
}

// --- 统一的鼠标移动事件 ---
window.addEventListener('pointermove', (event) => {
    // 1. 处理标注数值的拖拽 (保持不变)
    if (isDraggingLabel && selectedLabel) {
        const movementScale = textSize * 0.002;
        const dx = event.movementX * movementScale;
        const dy = -event.movementY * movementScale;
        const axis = selectedLabel.userData.axis;
        if (axis === 'x') { labelManualOffsets.x.x += dx; labelManualOffsets.x.y += dy; }
        else if (axis === 'y') { labelManualOffsets.y.x += dx; labelManualOffsets.y.y += dy; }
        else if (axis === 'z') { labelManualOffsets.z.x += dx; labelManualOffsets.z.z -= dy; }
        updateDimensions();
        return;
    }

    // 2. 处理物体（文字或背景图）的拖拽
    if (isDraggingObject && activeDragTarget) { // 注意这里使用了 activeDragTarget
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // 计算射线与平面的交点
        if (raycaster.ray.intersectPlane(dragPlane, dragIntersection)) {
            // 将计算出的新位置赋给当前正在拖动的目标 (文字组或背景图)
            activeDragTarget.position.copy(dragIntersection.sub(dragOffset));
            
            // 重要：只有当移动的是“文字组”时，才需要重新计算标注线
            // 如果移动的是背景图，标注线是不需要动的
            if (activeDragTarget === textGroup) {
                updateDimensions();
            }
        }
    }
});

// --- 统一的鼠标抬起事件 ---
window.addEventListener('pointerup', () => {
    isDraggingLabel = false;
    isDraggingObject = false;
    selectedLabel = null;
    controls.enabled = true; // 恢复相机
    container.style.cursor = 'default';
});
     function animate() { 
          requestAnimationFrame(animate); 
        controls.update(); 
        
        if (isFlowRGB) {
            flowTime += 0.015; 

            let targetMeshes = (glowMode === 'frontGlow') ? frontMeshes : backMeshes;
            if (glowMode === 'boxLight') targetMeshes = backMeshes;

            targetMeshes.forEach(mesh => {
                // 1. 初始化 Shader (只在第一次执行)
                if (!mesh.material.userData.isCOBShader) {
                    mesh.material.onBeforeCompile = (shader) => {
                        shader.uniforms.uTime = { value: 0 };
                        shader.uniforms.uIntensity = { value: 2.0 }; 

                        shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                            #include <common>
                            varying vec3 vWorldPos;
                        `);
                        shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                            #include <worldpos_vertex>
                            vWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;
                        `);

                        shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                            #include <common>
                            varying vec3 vWorldPos;
                            uniform float uTime;
                            uniform float uIntensity;
                            vec3 hsv2rgb(vec3 c) {
                                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                            }
                        `);

                        shader.fragmentShader = shader.fragmentShader.replace('#include <dithering_fragment>', `
                            #include <dithering_fragment>
                            float hue = fract(vWorldPos.x * 0.02 - uTime * 0.5);
                            vec3 rainbow = hsv2rgb(vec3(hue, 0.9, 1.0));
                            gl_FragColor.rgb += rainbow * uIntensity;
                        `);
                        mesh.material.userData.shader = shader;
                    };
                    mesh.material.userData.isCOBShader = true;
                }

                // 2. 关键修复：确保每次进入模式都重置 Uniform 值
                if (mesh.material.userData.shader) {
                    mesh.material.userData.shader.uniforms.uTime.value = flowTime;
                    mesh.material.userData.shader.uniforms.uIntensity.value = 2.0; // 强制设为发光
                    
                    // 额外优化：进入彩虹模式时，把原来的 emissive 颜色设为黑色
                    // 否则如果你之前点了红色，彩虹会和红色混合
                    mesh.material.emissive.set(0x000000); 
                }
            });
        } else {
            // 退出模式
            const allMeshes = backMeshes.concat(frontMeshes);
            allMeshes.forEach(m => {
                if (m.material.userData.shader) {
                    m.material.userData.shader.uniforms.uIntensity.value = 0;
                    // 恢复亮度
                    const baseBright = document.getElementById('brightnessSlider').value / 100 * 3.0;
                    m.material.emissiveIntensity = baseBright;
                }
            });
        } 
        // --- 呼吸灯和其他逻辑保持不变 ---
        if (isRGBGlow && !isFlowRGB && glowMode !== 'metalCut') {
            rgbHue += 0.002;
            if (rgbHue > 1) rgbHue = 0;
            const dynamicColor = new THREE.Color().setHSL(rgbHue, 1.0, 0.5);
            if (glowMode === 'boxLight' || glowMode === 'backGlow') {
                backMeshes.forEach(obj => { obj.material.color.copy(dynamicColor); obj.material.emissive.copy(dynamicColor); });
            } else if (glowMode === 'frontGlow') {
                frontMeshes.forEach(obj => { obj.material.color.copy(dynamicColor); obj.material.emissive.copy(dynamicColor); });
            }
        }

        // 渲染...
        const originalBg = scene.background;
        scene.background = new THREE.Color(0x000000);
        scene.traverse(darkenNonBloomed);
        bloomComposer.render();
        scene.traverse(restoreMaterial);
        scene.background = originalBg;
        finalComposer.render();
    }
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        bloomComposer.setSize(container.clientWidth, container.clientHeight);
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });
    
    animate();
</script>
