        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #444;
            transition: transform 0.1s, border-color 0.1s;
            box-sizing: border-box;
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #f39c12;
        }
        .color-swatch.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;

        /* 跑马灯动画 - 给预设颜色色块加流光效果 */
@keyframes marquee-swatch {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* RGB流水灯色块的跑马灯效果 */
.color-swatch[data-color="FLOWRGB"] {
    background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, white);
    background-size: 200% 100%; /* 扩展背景尺寸用于滚动 */
    animation: marquee-swatch 3s linear infinite; /* 3秒一轮，匀速循环 */
}

/* RGB呼吸灯色块的呼吸效果 */
.color-swatch[data-color="RGB"] {
    background: linear-gradient(135deg, red, orange, yellow, green, blue, purple);
    background-size: 200% 200%;
    animation: marquee-swatch 4s linear infinite alternate; /* 4秒一轮，往返滚动 */
}
/* 新增：右上角 SVG 上传控件样式 */
/* 修改原有的容器样式，增加过渡动画 */
/* 修改右上角面板为右下角悬浮窗 */
/* 修改容器：改为右下角，默认隐藏 */
#svg-upload-container {
    position: absolute;
    bottom: 30px; /* 距离底部 */
    right: 30px;  /* 距离右侧 */
    top: auto;    /* 取消顶部定位 */
    z-index: 1000;
    background: rgba(30, 30, 30, 0.9);
    padding: 0 12px 12px 12px; /* 顶部不需要padding，留给手柄 */
    border-radius: 8px;
    border: 1px solid #f39c12;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    width: 220px;
    transition: opacity 0.3s; /* 仅保留淡入淡出 */
}

/* 拖拽手柄样式 */
#panel-drag-handle {
    width: calc(100% + 24px);
    margin: 0 -12px 10px -12px;
    height: 30px;
    background: #333;
    border-radius: 8px 8px 0 0;
    cursor: move;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #666;
    border-bottom: 1px solid #444;
}
#panel-drag-handle:hover {
    background: #3d3d3d;
    color: #f39c12;
}

/* 移除旧的箭头样式（如果还存在的话） */

.upload-label {
    font-size: 11px;

    color: #f39c12;
    text-transform: uppercase;

}
.upload-btns {
    display: flex;
    gap: 8px;
}
.small-btn {
    padding: 6px 10px !important;

    margin: 0 !important;

}
.danger-btn {

}
.toggle-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #2980b9 !important;
}
.snapshot-btn {
    padding: 8px !important;
    font-size: 12px !important;
    background: #27ae60 !important;
}
/* 修改容器宽度以适应新布局 */
#svg-upload-container {
    width: 200px !important; /* 调整宽度 */
}
/* 内部内容容器的淡入淡出逻辑 */
#panel-inner-content {
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 15px; /* 给箭头留出空间 */
}
#svg-upload-container.collapsed #panel-inner-content {
    opacity: 0;
    pointer-events: none; /* 收缩时不可点击 */
}

/* 箭头旋转动画 */
#toggle-icon {
    transition: transform 0.4s;
    display: inline-block;
}
#svg-upload-container.collapsed #toggle-icon {
    transform: rotate(180deg); /* 展开时指向右，收缩时指向左 */
}

                        vec4 colY = texture2D(tex, uvXZ);
                        vec4 colZ = texture2D(tex, uvXY);

                        vec3 blend = getTriplanarBlend(normal);
                        return colX * blend.x + colY * blend.y + colZ * blend.z;
                    }
                `);

                        #endif

function createTextLabel(text, position, scaleFactor = 1.0) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 256;
    canvas.height = 128;
    ctx.font = 'Bold 60px Arial';
    ctx.fillStyle = '#f39c12'; 
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 80);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.scale.set(12 * scaleFactor, 6 * scaleFactor, 1);
    sprite.position.copy(position);
    return sprite;
}

function takeSnapshot() {
    // 1. 记录原始尺寸和像素比
    const originalWidth = container.clientWidth;
    const originalHeight = container.clientHeight;
    const originalPixelRatio = renderer.getPixelRatio();

    // 2. 设置截图倍率 (2 代表 2倍清晰度，3 代表超高清/4K级别)
    const zoom = 3; 
    
    // 3. 临时放大渲染器
    renderer.setSize(originalWidth * zoom, originalHeight * zoom, false);
    // 辉光合成器也要跟着放大，否则发光效果会变小
    bloomComposer.setSize(originalWidth * zoom, originalHeight * zoom);
    finalComposer.setSize(originalWidth * zoom, originalHeight * zoom);

    // 4. 执行高清渲染
    // 这一步非常关键：必须完整渲染后处理通道
    finalComposer.render();

    // 5. 导出图片 (使用最高质量)
    const dataURL = renderer.domElement.toDataURL('image/png', 1.0);

    // 6. 触发下载
    const link = document.createElement('a');
    const timestamp = new Date().getTime();
    link.download = `YiJiao_4K_Design_${timestamp}.png`;
    link.href = dataURL;
    link.click();

    // 7. 恢复原始尺寸，避免用户界面变大
    renderer.setPixelRatio(originalPixelRatio);
    renderer.setSize(originalWidth, originalHeight);
    bloomComposer.setSize(originalWidth, originalHeight);
    finalComposer.setSize(originalWidth, originalHeight);
    
    // 8. 重新渲染一次正常的画面，确保 UI 回归正常
    finalComposer.render();

    console.log("高清 4K 实拍图已导出");
}
function updateDimensions() {
    dimensionGroup.clear();
    if (textGroup.children.length === 0) return;

    // 1. 获取模型当前的全局包围盒
    const box = new THREE.Box3().setFromObject(textGroup);
    const size = new THREE.Vector3();
    box.getSize(size);
    const min = box.min;
    const max = box.max;
    
    // 计算模型的中心 Z 轴，让 X/Y 标注线始终处于模型厚度的中间
    const midZ = (min.z + max.z) / 2;

    const scaleFactor = textSize / 26; 
    const offset = 5 * scaleFactor; 
    const tick = 1 * scaleFactor; 
    const lineMat = new THREE.LineBasicMaterial({ color: 0x888888 });

    // --- 1. X轴标注 (宽度) ---
    const widthText = (size.x * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const xBasePos = new THREE.Vector3((min.x + max.x)/2, min.y - offset - (4 * scaleFactor), midZ);
    const xLabel = createTextLabel(widthText, xBasePos.clone().add(labelManualOffsets.x), scaleFactor);
    xLabel.userData.axis = 'x';
    dimensionGroup.add(xLabel);

    const xLinePoints = [
        new THREE.Vector3(min.x, min.y - offset, midZ), new THREE.Vector3(max.x, min.y - offset, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x, min.y - offset + tick, midZ), new THREE.Vector3(min.x, min.y - offset - tick, midZ),
        new THREE.Vector3(max.x, min.y - offset + tick, midZ), new THREE.Vector3(max.x, min.y - offset - tick, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(xLinePoints), lineMat));


    // --- 2. Y轴标注 (高度) ---
    const heightText = (size.y * 10).toFixed(0) + " mm"; 
    // Z 坐标使用 midZ 确保跟随
    const yBasePos = new THREE.Vector3(min.x - offset - (8 * scaleFactor), (min.y + max.y)/2, midZ);
    const yLabel = createTextLabel(heightText, yBasePos.clone().add(labelManualOffsets.y), scaleFactor);
    yLabel.userData.axis = 'y';
    dimensionGroup.add(yLabel);

    const yLinePoints = [
        new THREE.Vector3(min.x - offset, min.y, midZ), new THREE.Vector3(min.x - offset, max.y, midZ), // 主线使用 midZ
        new THREE.Vector3(min.x - offset + tick, min.y, midZ), new THREE.Vector3(min.x - offset - tick, min.y, midZ),
        new THREE.Vector3(min.x - offset + tick, max.y, midZ), new THREE.Vector3(min.x - offset - tick, max.y, midZ)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(yLinePoints), lineMat));


    // --- 3. Z轴标注 (厚度) ---
    const thicknessText = (size.z * 10).toFixed(0) + " mm"; 
    // Z轴标注本来就参考了 min.z/max.z，所以它之前就是稳的
    const zBasePos = new THREE.Vector3(max.x + offset + (6 * scaleFactor), min.y, midZ);
    const zLabel = createTextLabel(thicknessText, zBasePos.clone().add(labelManualOffsets.z), scaleFactor);
    zLabel.userData.axis = 'z';
    dimensionGroup.add(zLabel);

    const zLinePoints = [
        new THREE.Vector3(max.x + offset, min.y, min.z), new THREE.Vector3(max.x + offset, min.y, max.z),
        new THREE.Vector3(max.x + offset - tick, min.y, min.z), new THREE.Vector3(max.x + offset + tick, min.y, min.z),
        new THREE.Vector3(max.x + offset - tick, min.y, max.z), new THREE.Vector3(max.x + offset + tick, min.y, max.z)
    ];
    dimensionGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(zLinePoints), lineMat));
}

const svgLoader = new SVGLoader();
const svgInput = document.getElementById('svgInput');
const clearSvgBtn = document.getElementById('clearSvgBtn');
const textInputEl = document.getElementById('textInput');

svgInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const parsed = svgLoader.parse(event.target.result);
            svgPaths = parsed.paths;
            isSvgMode = true;
            
            // UI 更新
            clearSvgBtn.classList.remove('hidden');
            textInputEl.disabled = true; // 禁用文本输入
            textInputEl.style.opacity = 0.5;
              const fontSelector = document.getElementById('fontSelector');
            fontSelector.disabled = true;       // 禁用选择器
            fontSelector.style.opacity = 0.5;   // 变灰提示

            // 生成 3D 模型
            generate3DText(textInputEl.value, true);
        } catch (err) {
            alert("SVG 轮廓解析失败，请确保上传了规范的矢量文件！");
            console.error(err);
        }
    };
    reader.readAsText(file);
    e.target.value = ''; // 清空选择器以便能重复选同一个文件
});
const bgInput = document.getElementById('bgInput');
const clearBgBtn = document.getElementById('clearBgBtn');

                bgPlaneMesh.geometry.dispose();
                bgPlaneMesh.material.dispose();

            const aspect = texture.image.width / texture.image.height;
            const bgHeight = 300; // 设定一个基础高度
            const bgWidth = bgHeight * aspect;

            // 3. 创建背景平面
            const geometry = new THREE.PlaneGeometry(bgWidth, bgHeight);
            const material = new THREE.MeshBasicMaterial({ 
    map: texture, 
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 1.0, // 可以调回 1.0 让图片更清晰

function updateBrightness(percent) {
      if (glowMode === 'metalCut' || glowMode === 'acrylicCut') return; 
    
    // 1. 计算自发光强度（之前改过的，最高阈值设为 1.2）
    const ledIntensity = (percent / 100) * 1.2;   
    document.getElementById('brightnessValue').textContent = `${Math.round(percent)}%`;
    
    // 2. 【核心修改】同步调整辉光滤镜的强度
    // 原本默认强度是 0.5。现在让它随百分比变化：0%时强度为0，100%时强度为0.5
    if (bloomPass) {
        bloomPass.strength = (percent / 100) * 0.8;
    }
    
    // 3. 更新模型材质的亮度
    let targetMeshes = (glowMode === 'backGlow' || glowMode === 'testBackGlow') ? backMeshes : frontMeshes;
    targetMeshes.forEach(obj => { 
        if(obj.material && obj.material.emissiveIntensity !== undefined) {
            obj.material.emissiveIntensity = ledIntensity; 
        }
    });
    
    ledPixels.forEach(pixel => {
        if (pixel.material.emissiveIntensity !== undefined) pixel.material.emissiveIntensity = ledIntensity;
    });
}
    document.getElementById('brightnessSlider').addEventListener('input', (e) => updateBrightness(e.target.value));

container.addEventListener('pointerdown', (event) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    // --- 【新增：移动模式确认逻辑】 ---

        outlinePass.edgeStrength = 3.0; // 边框恢复亮度
        return; // 直接结束，不再执行下方的选中逻辑
    }

    raycaster.setFromCamera(mouse, camera);

    // 1. 标注标签检测 (标注保持原样：按下即拖动，不参与 M 模式)
    const labelIntersects = raycaster.intersectObjects(dimensionGroup.children);
    if (labelIntersects.length > 0) {
        selectedLabel = labelIntersects[0].object;
        isDraggingLabel = true;
        controls.enabled = false;
        return;
    }

    // 2. 物体选中逻辑
    const intersects = raycaster.intersectObjects([textGroup, bgPlaneMesh].filter(Boolean), true);

    if (intersects.length > 0) {
        let hitObject = intersects[0].object;
        let logicalTarget = (bgPlaneMesh && (hitObject === bgPlaneMesh || hitObject.parent === bgPlaneMesh)) 
                            ? bgPlaneMesh : textGroup;

        // 【修改：仅执行选中，不开启拖拽】
        selectedObject = logicalTarget;
        outlinePass.selectedObjects = [logicalTarget];
        container.style.cursor = 'pointer';
        
        // 这里的 isDraggingObject 逻辑可以删掉，因为移动改用 M 键触发
        isDraggingObject = false; 
    } else {
        // 点空白处 -> 取消选中
        selectedObject = null;
        outlinePass.selectedObjects = [];
        container.style.cursor = 'default';
        
        // 如果有点中空白，也强制退出移动模式
        if (typeof isMoveModeActive !== 'undefined') {
            isMoveModeActive = false;
            controls.enabled = true;
        }

// 辅助函数：设置拖拽平面
function setupDragPlane(intersectPoint, targetPosition) {
    const normal = new THREE.Vector3();
    camera.getWorldDirection(normal).negate();
    dragPlane.setFromNormalAndCoplanarPoint(normal, intersectPoint);
    dragOffset.copy(intersectPoint).sub(targetPosition);
}

// --- 统一的鼠标移动事件 ---
window.addEventListener('pointermove', (event) => {
    // 1. 处理标注数值的拖拽 (保持不变)
    if (isDraggingLabel && selectedLabel) {
        const movementScale = textSize * 0.002;
        const dx = event.movementX * movementScale;
        const dy = -event.movementY * movementScale;
        const axis = selectedLabel.userData.axis;
        if (axis === 'x') { labelManualOffsets.x.x += dx; labelManualOffsets.x.y += dy; }
        else if (axis === 'y') { labelManualOffsets.y.x += dx; labelManualOffsets.y.y += dy; }
        else if (axis === 'z') { labelManualOffsets.z.x += dx; labelManualOffsets.z.z -= dy; }
        updateDimensions();
        return;
    }

    // 2. 【核心修复】：处理 M 键激活后的物体跟随
    if (isMoveModeActive && selectedObject) {
        const rect = container.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // 计算射线与平面的交点
        if (raycaster.ray.intersectPlane(dragPlane, dragIntersection)) {
            // 将物体位置更新为交点位置
            // 这里不需要减去 dragOffset，因为 M 模式通常是让重心中点直接对齐鼠标
            selectedObject.position.copy(dragIntersection);
            
            // 重要：如果是文字组，同步更新标注
            if (selectedObject === textGroup) {
                updateDimensions();
            }
        }
    }
});

    function animate() {
    requestAnimationFrame(animate);
    controls.update();
    
    // 全局时间累加
    const currentTime = performance.now() * 0.001; 

    // 【流水灯核心】只驱动 flowMeshes 数组
    if (isFlowRGB && flowMeshes.length > 0) {
        flowMeshes.forEach(mesh => {
            if (mesh.material.userData.uTime) {
                mesh.material.userData.uTime.value = currentTime;
            }
        });
    }

    // 2. 呼吸灯逻辑
  // --- 找到 animate 函数中的呼吸灯逻辑部分 ---
    else if (isRGBGlow && glowMode !== 'metalCut') {
        rgbHue += 0.002;
        if (rgbHue > 1) rgbHue = 0;
        const dynamicColor = new THREE.Color().setHSL(rgbHue, 1.0, 0.5);

        // --- 核心修复：重新定义目标选择逻辑 ---
        let targetMeshes = [];

        if (glowMode === 'backGlow' || glowMode === 'testBackGlow') {
            // 背面发光系列：控制 backMeshes
            targetMeshes = backMeshes;
        } 
        else if (glowMode === 'sideGlowTest') {
            // 侧面发光：发光层就是 frontMeshes[0]
            targetMeshes = frontMeshes; 
        }
        else if (glowMode === 'sideHalfGlowTest') {
            // 侧面一半发光：第一个 Mesh 是发光层
            targetMeshes = frontMeshes.length > 0 ? [frontMeshes[0]] : [];
        }
        else {
            // 默认模式（正面发光、霓虹灯等）：全部控制 frontMeshes
            targetMeshes = frontMeshes;
        }

        // 应用动态颜色
        targetMeshes.forEach(obj => {
            if (obj && obj.material) {
                // 确保清理掉流水灯残留，让颜色能直接显示
                if (obj.material.emissiveMap) obj.material.emissiveMap = null;
                
                obj.material.color.copy(dynamicColor);
                if (obj.material.emissive) obj.material.emissive.copy(dynamicColor);
            }
        });
    }
        // 渲染...
        const originalBg = scene.background;
        scene.background = new THREE.Color(0x000000);
        scene.traverse(darkenNonBloomed);
        bloomComposer.render();
        scene.traverse(restoreMaterial);
        scene.background = originalBg;
        finalComposer.render();
    }
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        bloomComposer.setSize(container.clientWidth, container.clientHeight);
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });
    
    animate();
