    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #393939; font-family: 'Microsoft YaHei', sans-serif; color: white; }
        body { display: flex; flex-direction: row; }
        #sidebar { width: 320px; min-width: 320px; height: 100vh; background: #2c2c2c; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 20; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; box-sizing: border-box; }
        #canvas-container { flex: 1; height: 100%; position: relative; background-color: #393939; min-width: 0; }
        .color-swatch-container.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .header-box { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .header-box h1 { font-size: 18px; color: #f39c12; margin: 0; letter-spacing: 1px; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 12px; padding: 4px 8px; background: #3d3d3d; border-radius: 3px; border: 1px solid #555;}
        
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #bbb; font-weight: bold; margin-top: 10px; }
        .option-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .material-btn { width: 42px; height: 42px; border-radius: 4px; border: 2px solid #444; background-size: cover; cursor: pointer; }
        .material-btn.active { border-color: #f39c12; box-shadow: 0 0 5px #f39c12; }
        .material-btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #444;
            transition: transform 0.1s, border-color 0.1s;
            box-sizing: border-box;
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #f39c12;
        }
        .color-swatch.active {
            border-color: #f39c12;
            box-shadow: 0 0 5px #f39c12;
        }
        #frontColorPicker, #ledColorPicker { width: 100%; height: 35px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; border-radius: 3px; }
        /* 跑马灯动画 - 给预设颜色色块加流光效果 */
@keyframes marquee-swatch {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* RGB流水灯色块的跑马灯效果 */
.color-swatch[data-color="FLOWRGB"] {
    background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, white);
    background-size: 200% 100%; /* 扩展背景尺寸用于滚动 */
    animation: marquee-swatch 3s linear infinite; /* 3秒一轮，匀速循环 */
}

/* RGB呼吸灯色块的呼吸效果 */
.color-swatch[data-color="RGB"] {
    background: linear-gradient(135deg, red, orange, yellow, green, blue, purple);
    background-size: 200% 200%;
    animation: marquee-swatch 4s linear infinite alternate; /* 4秒一轮，往返滚动 */
}

/* 选中状态强化 */
.color-swatch.active.marquee-active {
    border-color: #f39c12;
    box-shadow: 0 0 8px #f39c12, 0 0 12px rgba(243, 156, 18, 0.5);
}
        #textInput {

        input[type=range]:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .action-btn { width: 100%; padding: 12px; background: #4a4a4a; border: 1px solid #666; color: white; font-weight: bold; border-radius: 3px; cursor: pointer; margin-top: auto; }
        .action-btn:hover { background: #555; border-color: #f39c12; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #333; border-color: #444; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; z-index: 100; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 8px;}
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f39c12; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { body { flex-direction: column; } #sidebar { width: 100%; height: 45vh; } #canvas-container { height: 55vh; } }

        .note { font-size: 11px; color: #888; margin-top: 5px; text-align: center; border-top: 1px solid #3a3a3a; padding-top: 8px; }
        
        .thickness-control {
            background: #3a3a3a;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #f39c12;
            margin-top: 5px;
        }

            margin-top: 0;
        }
/* 数字输入框的样式 */

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js'; 
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ==========================================
    // 全局状态管理
    // ==========================================
    let isRGBGlow = false; // 是否开启 RGB 动态光效
    let rgbHue = 0; 
    // 流水灯相关全局变量
    let isFlowRGB = false; // 是否开启RGBW流水灯
    let flowTime = 0; // 流水灯时间控制
    let flowDirection = 1; // 流水灯方向 (1: 从左到右, -1: 从右到左)
    let ledPixels = []; // 存储灯光像素点（用于流水灯效果）
    
    let currentTexName = 'Metal011';
    let currentIsBrushed = true;
    let currentTintColor = 0xffffff;

    // 工艺模式：'backGlow', 'frontGlow', 'acrylicCut', 'metalCut', 'boxLight'
    let glowMode = 'backGlow'; 

    // 尺寸控制
    let frontThickness = 5.0; // 映射为 Box Length Padding
    let backThickness = 5.0;  // 映射为 Box Height Padding
    let boxDepth = 10.0;      // 仅用于 boxLight

    // 字体相关
    let currentFont = null;
    let fontLoader = new FontLoader();
    
    // 核心组
    let frontMeshes = [];    // 普通模式正面 / 盒子模式的内部金属字
    let backMeshes = [];     // 普通模式背面 / 盒子模式的外部发光盒
    let singleMesh = null;   // 单体模式
    let isDecomposed = false;
    let textGroup = new THREE.Group();
    let textSize = 26; // 默认文字大小/高度
let yScale = 1.0; // 纵向拉伸倍率
    // 场景基础
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const blenderBgColor = new THREE.Color('#393939');
    scene.background = blenderBgColor;
    scene.fog = new THREE.Fog(blenderBgColor, 100, 1000); 

    const gridSize = 4000;
    const gridDivisions = 400;
    const gridColor = new THREE.Color('#464646'); 
    const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, gridColor, gridColor);
    scene.add(gridHelper);

    const xAxis = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-gridSize/2,0,0), new THREE.Vector3(gridSize/2,0,0)]),
        new THREE.LineBasicMaterial({ color: '#c44550', linewidth: 1 })
    );
    scene.add(xAxis);

    const zAxis = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,-gridSize/2), new THREE.Vector3(0,0,gridSize/2)]),
        new THREE.LineBasicMaterial({ color: '#7dab4f', linewidth: 1 })
    );
    scene.add(zAxis);

    scene.add(textGroup);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8; 
    container.appendChild(renderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // ==========================================
    // 后处理 (辉光)
    // ==========================================
    const BLOOM_SCENE = 1; 
    const bloomLayer = new THREE.Layers();
    bloomLayer.set(BLOOM_SCENE);

    const darkMaterial = new THREE.MeshBasicMaterial({ color: 'black' });
    const darkLineMaterial = new THREE.LineBasicMaterial({ color: 'black' }); 
    const materials = {}; 

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.2, 1, 0); 
    const bloomComposer = new EffectComposer(renderer);
    bloomComposer.renderToScreen = false;

    let flowTexture = null;

function getFlowTexture() {
    if (flowTexture) return flowTexture;
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 1;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 256, 0);
    gradient.addColorStop(0, "red");
    gradient.addColorStop(0.2, "yellow");
    gradient.addColorStop(0.4, "lime");
    gradient.addColorStop(0.6, "cyan");
    gradient.addColorStop(0.8, "blue");
    gradient.addColorStop(1, "red");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 256, 1);
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping; // 允许横向循环
    flowTexture = tex;
    return flowTexture;
}
    // 材质创建系统 (升级为高级竖向拉丝版)
    // ==========================================
    const textureLoader = new THREE.TextureLoader();
    
    function createBackMaterial(texName, isBrushed, tintColor = 0xffffff) {
        const map = textureLoader.load(`textures/${texName}_2K-JPG_Color.jpg`);
        const normalMap = textureLoader.load(`textures/${texName}_2K-JPG_NormalGl.jpg`);
        const roughnessMap = textureLoader.load(`textures/${texName}_2K-JPG_Roughness.jpg`);

        [map, normalMap, roughnessMap].forEach(t => {
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
        });

        const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(tintColor),
            map: map, 
            normalMap: isBrushed ? normalMap : null,
            roughnessMap: roughnessMap, 
            metalness: 1.0, 
            roughness: 0.5, 
            envMapIntensity: 0.5, 
            side: THREE.DoubleSide
        });

        if (isBrushed) {
            mat.onBeforeCompile = (shader) => {
                shader.uniforms.uRepeat = { value: 0.15 }; 
                shader.uniforms.uStretch = { value: 0.02 }; 

                shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                `);
                shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                    #include <worldpos_vertex>
                    vWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;
                    vWorldNormal = normalize(mat3(modelMatrix) * normal);
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                    #include <common>
                    varying vec3 vWorldPosition;
                    varying vec3 vWorldNormal;
                    uniform float uRepeat;
                    uniform float uStretch;

                    vec3 getTriplanarBlend(vec3 normal) {
                        vec3 blend = abs(normal);
                        blend = pow(blend, vec3(4.0));
                        return blend / (blend.x + blend.y + blend.z);
                    }

                    vec4 triplanarTexture(sampler2D tex, vec3 worldPos, vec3 normal) {
                        vec2 uvXY = vec2(worldPos.y * uStretch, worldPos.x * uRepeat);
                        vec2 uvZY = vec2(worldPos.y * uStretch, worldPos.z * uRepeat);
                        vec2 uvXZ = vec2(worldPos.z * uStretch, worldPos.x * uRepeat);

                        vec4 colX = texture2D(tex, uvZY);
                        vec4 colY = texture2D(tex, uvXZ);
                        vec4 colZ = texture2D(tex, uvXY);

                        vec3 blend = getTriplanarBlend(normal);
                        return colX * blend.x + colY * blend.y + colZ * blend.z;
                    }
                `);

                shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
                    #ifdef USE_MAP
                        vec4 sampledColor = triplanarTexture(map, vWorldPosition, vWorldNormal);
                        diffuseColor.rgb *= sampledColor.rgb;
                    #endif
                `);
                
                shader.fragmentShader = shader.fragmentShader.replace('#include <roughnessmap_fragment>', `
                    float roughnessFactor = roughness;
                    #ifdef USE_ROUGHNESSMAP
                        roughnessFactor *= triplanarTexture(roughnessMap, vWorldPosition, vWorldNormal).r;
                    #endif
                `);

                if (isBrushed) {
                    shader.fragmentShader = shader.fragmentShader.replace('#include <normal_fragment_maps>', `
                        #ifdef USE_NORMALMAP
                            vec3 normalSample = triplanarTexture(normalMap, vWorldPosition, vWorldNormal).xyz * 2.0 - 1.0;
                            normal = normalize(normal + normalSample * 0.8); 
                        #endif
                    `);
                }
            };
        }
        return mat;
    }

        switch(type) {

    function loadFontAndGenerate(fontType, text, adjustCamera = true) {
        const url = getFontUrlByType(fontType);
        loadingEl.style.display = 'flex';
        
        fontLoader.load(url, function(font) {
            currentFont = font;
            loadingEl.style.display = 'none';
            generate3DText(text || document.getElementById('textInput').value, adjustCamera);
        }, undefined, function(err) {
            console.warn('字体加载失败，使用默认英文字体', err);
            fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', function(fallbackFont) {
                currentFont = fallbackFont;
                loadingEl.style.display = 'none';
                generate3DText(text || document.getElementById('textInput').value, adjustCamera);
                document.getElementById('fontSelector').value = 'helvetiker';
            });
        });
    }

    // 生成3D文字
  function generate3DText(textString, adjustCamera = true) {
    if (!currentFont) {
        loadFontAndGenerate('helvetiker', textString, adjustCamera);
        return;
    }

    // 清理旧模型... (保持原有逻辑)
    while(textGroup.children.length > 0){ 
        const obj = textGroup.children[0];
        if(obj.geometry) obj.geometry.dispose();
        if(obj.material) {
            if(Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
        }
        textGroup.remove(obj); 
    }
    
    frontMeshes = [];
    backMeshes = [];
    singleMesh = null;
    ledPixels = []; 

    if (!textString.trim()) return;

    // --- 这里修正：使用外部的 textSize 变量，而不是固定 26 ---
    const commonOpts = {
        font: currentFont, 
        size: textSize, 
        curveSegments: 6,
        bevelEnabled: true,
        bevelThickness: 0.5,
        bevelSize: 0.3,
        bevelOffset: 0,
        bevelSegments: 3
    };

    if (glowMode === 'boxLight') {
        const textGeo = new TextGeometry(textString, { ...commonOpts, height: 2, bevelEnabled: false });
        textGeo.scale(1, yScale, 1); // 纵向拉伸
        
        textGeo.computeBoundingBox();
        const tW = textGeo.boundingBox.max.x - textGeo.boundingBox.min.x;
        const tH = textGeo.boundingBox.max.y - textGeo.boundingBox.min.y;
        textGeo.translate(-0.5 * tW, -0.5 * tH, 0); 

        const boxW = tW + (frontThickness * 4);
        const boxH = tH + (backThickness * 4);
        const boxD = boxDepth;

        const metalMat = createBackMaterial(currentTexName, currentIsBrushed, currentTintColor);
        const innerMesh = new THREE.Mesh(textGeo, metalMat);
        innerMesh.position.z = (boxD / 2) - 0.2; 
        textGroup.add(innerMesh);
        frontMeshes.push(innerMesh); 

        const boxGeo = new THREE.BoxGeometry(boxW, boxH, boxD);
        const ledColor = new THREE.Color(document.getElementById('ledColorPicker').value);
        const boxMat = new THREE.MeshPhysicalMaterial({
            color: ledColor, emissive: ledColor, emissiveIntensity: 0, 
            transmission: 0.6, opacity: 0.6, transparent: true, roughness: 0.2, metalness: 0.1
        });
        const boxMesh = new THREE.Mesh(boxGeo, boxMat);
        boxMesh.layers.enable(BLOOM_SCENE);
        textGroup.add(boxMesh);
        backMeshes.push(boxMesh);
    } 
    else if (glowMode === 'acrylicCut' || glowMode === 'metalCut') {
        const geo = new TextGeometry(textString, { ...commonOpts, height: frontThickness + backThickness });
        geo.scale(1, yScale, 1); // 纵向拉伸

        geo.computeBoundingBox();
        geo.translate(-0.5 * (geo.boundingBox.max.x - geo.boundingBox.min.x), -0.5 * (geo.boundingBox.max.y - geo.boundingBox.min.y), 0);

        let mat = (glowMode === 'acrylicCut') ? new THREE.MeshStandardMaterial({color: document.getElementById('ledColorPicker').value, roughness:0.2}) : createBackMaterial(currentTexName, true, currentTintColor);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.z = -backThickness;
        mesh.userData.baseZ = -backThickness; // 记录位置
        textGroup.add(mesh);
        singleMesh = mesh;
    } 
    else {
        // 双层发光字模式
        const isBackGlow = (glowMode === 'backGlow');
        const fGeo = new TextGeometry(textString, { ...commonOpts, height: frontThickness });
        const bGeo = new TextGeometry(textString, { ...commonOpts, height: backThickness });
        
        fGeo.scale(1, yScale, 1);
        bGeo.scale(1, yScale, 1);

        fGeo.computeBoundingBox();
        const cX = -0.5 * (fGeo.boundingBox.max.x - fGeo.boundingBox.min.x);
        const cY = -0.5 * (fGeo.boundingBox.max.y - fGeo.boundingBox.min.y);
        fGeo.translate(cX, cY, 0);
        bGeo.translate(cX, cY, 0);

        const ledColor = new THREE.Color(document.getElementById('ledColorPicker').value);
        const ledMat = new THREE.MeshStandardMaterial({ color: ledColor, emissive: ledColor, emissiveIntensity: 0 });
        const capMat = createBackMaterial(currentTexName, true, currentTintColor);

        const fMesh = new THREE.Mesh(fGeo, isBackGlow ? capMat : ledMat);
        fMesh.userData.baseZ = 0; 
        if (!isBackGlow) fMesh.layers.enable(BLOOM_SCENE);
        textGroup.add(fMesh);
        frontMeshes.push(fMesh);

        const bMesh = new THREE.Mesh(bGeo, isBackGlow ? ledMat : capMat);
        const bBaseZ = -backThickness;
        bMesh.position.z = bBaseZ;
        bMesh.userData.baseZ = bBaseZ; // 用于一键解体
        if (isBackGlow) bMesh.layers.enable(BLOOM_SCENE);
        textGroup.add(bMesh);
        backMeshes.push(bMesh);
    }

    updateBrightness(document.getElementById('brightnessSlider').value);
    if (adjustCamera) centerAndFitCamera();
    isDecomposed = false;
}

    // 为双层发光字创建LED像素矩阵
   
    function centerAndFitCamera() {
        if (textGroup.children.length === 0) return;
        const box = new THREE.Box3().setFromObject(textGroup);
        const center = box.getCenter(new THREE.Vector3());
        
        textGroup.position.x = -center.x;
        textGroup.position.y = -center.y;
        
        const newBox = new THREE.Box3().setFromObject(textGroup);
        const bottomY = newBox.min.y; 
        const floorHeight = bottomY - 0.5;
        gridHelper.position.y = floorHeight;
        xAxis.position.y = floorHeight;
        zAxis.position.y = floorHeight;

        const size = newBox.getSize(new THREE.Vector3());
        let cameraDist = Math.max(size.x, size.y, size.z) * 1.5;
        camera.position.set(0, 0, cameraDist);
        controls.target.set(0, 0, 0);
        controls.update();
        
        scene.fog.near = cameraDist * 0.5;
        scene.fog.far = cameraDist * 5.0;
    }

    function updateBrightness(percent) {
        if (glowMode === 'acrylicCut' || glowMode === 'metalCut') return;

        const ledIntensity = (percent / 100) * 3.0;   
        document.getElementById('brightnessValue').textContent = `${Math.round(percent)}%`;
        
        if (glowMode === 'boxLight') {
            backMeshes.forEach(obj => obj.material.emissiveIntensity = ledIntensity);
        } else if (glowMode === 'backGlow') {
            backMeshes.forEach(obj => obj.material.emissiveIntensity = ledIntensity);
        } else {
            frontMeshes.forEach(obj => obj.material.emissiveIntensity = ledIntensity);
        }
        
        // 更新流水灯像素点亮度
        ledPixels.forEach(pixel => {
            if (pixel.material.emissiveIntensity !== undefined) {
                pixel.material.emissiveIntensity = ledIntensity;
            }
        });
    }

            if (isNaN(val)) val = 5.0;
            val = Math.max(0.5, Math.min(25, val)); // 限制范围
            frontInput.value = val.toFixed(1);
            frontSlider.value = val;
            frontThickness = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    // --- 2. 背面厚度控制 (滑块 + 输入框) ---
    const backSlider = document.getElementById('backThicknessSlider');
    const backInput = document.getElementById('backThicknessInput');

    backSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        if(backInput) backInput.value = val.toFixed(1);
        backThickness = val;
        generate3DText(document.getElementById('textInput').value, false);
    });

    if(backInput) {
        backInput.addEventListener('change', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val)) val = 5.0;
            val = Math.max(0.5, Math.min(25, val));
            backInput.value = val.toFixed(1);
            backSlider.value = val;
            backThickness = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    // --- 3. 灯箱深度控制 (针对 boxLight 模式) ---
    const depthSlider = document.getElementById('depthSlider');
    const depthInput = document.getElementById('depthInput');

    depthSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        if(depthInput) depthInput.value = val.toFixed(1);
        boxDepth = val;
        if (glowMode === 'boxLight') {
            generate3DText(document.getElementById('textInput').value, false);
        }
    });

    if(depthInput) {
        depthInput.addEventListener('change', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val)) val = 10.0;
            val = Math.max(5, Math.min(40, val));
            depthInput.value = val.toFixed(1);
            depthSlider.value = val;
            boxDepth = val;
            if (glowMode === 'boxLight') {
                generate3DText(document.getElementById('textInput').value, false);
            }
        });
    }

    // --- 4. 一键解体按钮 ---
    document.getElementById('decomposeBtn').addEventListener('click', () => {
        if (glowMode === 'acrylicCut' || glowMode === 'metalCut' || glowMode === 'boxLight') return; 

        isDecomposed = !isDecomposed;
        const gap = 20; 

        if (frontMeshes.length > 0 && backMeshes.length > 0) {
            const fMesh = frontMeshes[0];
            const bMesh = backMeshes[0];

            if (isDecomposed) {
                gsap.to(fMesh.position, { z: fMesh.userData.baseZ + gap, duration: 1, ease: "power2.inOut" });
                gsap.to(bMesh.position, { z: bMesh.userData.baseZ - gap, duration: 1, ease: "power2.inOut" });
            } else {
                gsap.to(fMesh.position, { z: fMesh.userData.baseZ, duration: 1, ease: "power2.inOut" });
                gsap.to(bMesh.position, { z: bMesh.userData.baseZ, duration: 1, ease: "power2.inOut" });
            }
        }
        document.getElementById('decomposeBtn').innerText = isDecomposed ? '一键合并' : '一键解体 (Explode)';
    });

    // --- 5. 文字和字体输入监听 ---
    document.getElementById('textInput').addEventListener('input', (e) => {
        if (currentFont) generate3DText(e.target.value, true);
    });

    document.getElementById('fontSelector').addEventListener('change', (e) => {
        const selected = e.target.value;
        const currentText = document.getElementById('textInput').value;
        loadFontAndGenerate(selected, currentText, true);
    });
    // 颜色方块点击事件
   document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
        if (glowMode === 'metalCut') return;

        // 移除所有色块的active状态
        document.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.remove('active', 'marquee-active');
        });
        
        // 给当前点击的色块添加active状态
        swatch.classList.add('active');

        const color = swatch.dataset.color;

        if (color === 'FLOWRGB') {
             swatch.classList.add('marquee-active');
        isFlowRGB = true;
        isRGBGlow = false;
        updateBrightness(80); // 跑马灯通常需要高亮度
        } else if (color === 'RGB') {
            // 开启RGB呼吸灯 - 给色块加跑马灯激活状态
            swatch.classList.add('marquee-active');
            isRGBGlow = true;
            isFlowRGB = false;
        } else {
            // 普通颜色 - 关闭所有动态效果
            isFlowRGB = false;
            isRGBGlow = false;

              backMeshes.concat(frontMeshes).forEach(m => {
            m.material.emissiveMap = null;
        });
        }
    });
});
// --- 纵向拉伸倍率联动 (Scale Y) ---
    
  

    // --- 文字基准大小联动 (Size) ---
    const textSizeSlider = document.getElementById('textSizeSlider');
    const textSizeInput = document.getElementById('textSizeInput');

    // 这里注意：要删掉你代码里之前可能存在的旧 textSizeSlider 监听器
    if(textSizeSlider) {
        textSizeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if(textSizeInput) textSizeInput.value = val; // 同步数字框
            textSize = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    if(textSizeInput) {
        textSizeInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val)) val = 26;
            val = Math.max(10, Math.min(100, val)); // 限制范围 10~100
            textSizeInput.value = val;
            textSizeSlider.value = val; // 同步滑块
            textSize = val;
            generate3DText(document.getElementById('textInput').value, false);
        });
    }

    // --- 以下是原本就有的初始化代码，保持不动 ---
    updateUIState();
    loadFontAndGenerate('helvetiker', document.getElementById('textInput').value, true);
    // ==========================================
    // 渲染循环
    // ==========================================
    function darkenNonBloomed(obj) {
        if (bloomLayer.test(obj.layers) === false) {
            if (obj.isMesh) {
                materials[obj.uuid] = obj.material;
                obj.material = darkMaterial;
            } else if (obj.isLine || obj.isLineSegments) {
                materials[obj.uuid] = obj.material;
                obj.material = darkLineMaterial;
            }
        }
    }

    function restoreMaterial(obj) {
        if (materials[obj.uuid]) {
            obj.material = materials[obj.uuid];
            delete materials[obj.uuid];
        }
    }

    let scanX = 0; // 全局扫描位置

     function animate() { 
          requestAnimationFrame(animate); 
        controls.update(); 
        
        if (isFlowRGB) {
            flowTime += 0.015; 

            let targetMeshes = (glowMode === 'frontGlow') ? frontMeshes : backMeshes;
            if (glowMode === 'boxLight') targetMeshes = backMeshes;

            targetMeshes.forEach(mesh => {
                // 1. 初始化 Shader (只在第一次执行)
                if (!mesh.material.userData.isCOBShader) {
                    mesh.material.onBeforeCompile = (shader) => {
                        shader.uniforms.uTime = { value: 0 };
                        shader.uniforms.uIntensity = { value: 2.0 }; 

                        shader.vertexShader = shader.vertexShader.replace('#include <common>', `
                            #include <common>
                            varying vec3 vWorldPos;
                        `);
                        shader.vertexShader = shader.vertexShader.replace('#include <worldpos_vertex>', `
                            #include <worldpos_vertex>
                            vWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;
                        `);

                        shader.fragmentShader = shader.fragmentShader.replace('#include <common>', `
                            #include <common>
                            varying vec3 vWorldPos;
                            uniform float uTime;
                            uniform float uIntensity;
                            vec3 hsv2rgb(vec3 c) {
                                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                            }
                        `);

                        shader.fragmentShader = shader.fragmentShader.replace('#include <dithering_fragment>', `
                            #include <dithering_fragment>
                            float hue = fract(vWorldPos.x * 0.02 - uTime * 0.5);
                            vec3 rainbow = hsv2rgb(vec3(hue, 0.9, 1.0));
                            gl_FragColor.rgb += rainbow * uIntensity;
                        `);
                        mesh.material.userData.shader = shader;
                    };
                    mesh.material.userData.isCOBShader = true;
                }

                // 2. 关键修复：确保每次进入模式都重置 Uniform 值
                if (mesh.material.userData.shader) {
                    mesh.material.userData.shader.uniforms.uTime.value = flowTime;
                    mesh.material.userData.shader.uniforms.uIntensity.value = 2.0; // 强制设为发光
                    
                    // 额外优化：进入彩虹模式时，把原来的 emissive 颜色设为黑色
                    // 否则如果你之前点了红色，彩虹会和红色混合
                    mesh.material.emissive.set(0x000000); 
                }
            });
        } else {
            // 退出模式
            const allMeshes = backMeshes.concat(frontMeshes);
            allMeshes.forEach(m => {
                if (m.material.userData.shader) {
                    m.material.userData.shader.uniforms.uIntensity.value = 0;
                    // 恢复亮度
                    const baseBright = document.getElementById('brightnessSlider').value / 100 * 3.0;
                    m.material.emissiveIntensity = baseBright;
                }
            });
        } 
        // --- 呼吸灯和其他逻辑保持不变 ---
        if (isRGBGlow && !isFlowRGB && glowMode !== 'metalCut') {
            rgbHue += 0.002;
            if (rgbHue > 1) rgbHue = 0;
            const dynamicColor = new THREE.Color().setHSL(rgbHue, 1.0, 0.5);
            if (glowMode === 'boxLight' || glowMode === 'backGlow') {
                backMeshes.forEach(obj => { obj.material.color.copy(dynamicColor); obj.material.emissive.copy(dynamicColor); });
            } else if (glowMode === 'frontGlow') {
                frontMeshes.forEach(obj => { obj.material.color.copy(dynamicColor); obj.material.emissive.copy(dynamicColor); });
            }
        }

        // 渲染...
        const originalBg = scene.background;
        scene.background = new THREE.Color(0x000000);
        scene.traverse(darkenNonBloomed);
        bloomComposer.render();
        scene.traverse(restoreMaterial);
        scene.background = originalBg;
        finalComposer.render();
    }
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        bloomComposer.setSize(container.clientWidth, container.clientHeight);
        finalComposer.setSize(container.clientWidth, container.clientHeight);
    });
    
    animate();
</script>
